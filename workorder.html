<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>作業指示書</title>
  <style>
    :root{
      --bg:#eef4fb;
      --card:#fff;
      --line:#d6dde8;
      --text:#0f172a;
      --muted:#475569;
      --blue:#0a5ec2;
      --blue-dk:#084892;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{max-width:1860px;margin:0 auto;padding:24px;overflow-x:auto;}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
    .back{
      border:none;background:none;cursor:pointer;color:var(--blue);
      font-size:15px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:6px;
    }
    .actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
    .actions .search-inline{
      display:flex;align-items:center;gap:6px;
      padding:7px 8px;
      border:1px solid #cbd5e1;
      border-radius:8px;
      background:#f8fafc;
    }
    .actions .search-inline label{
      font-size:12px;font-weight:800;color:#334155;white-space:nowrap;
    }
    .actions .search-inline .inp{
      width:150px;min-width:110px;height:34px;padding:6px 8px;font-size:13px;
      border:1px solid #cbd5e1;border-radius:6px;font-family:inherit;background:#fff;outline:none;
    }
    .actions .search-inline .inp:focus{border-color:var(--blue);}
    .actions .search-inline .inp-date{width:132px;min-width:132px;}
    .search-modal{
      position:fixed;inset:0;z-index:9999;
      display:none;align-items:center;justify-content:center;
      background:rgba(15,23,42,.38);
    }
    .search-modal.open{display:flex}
    .search-modal-card{
      width:min(860px,92vw);max-height:78vh;overflow:auto;
      background:#fff;border-radius:10px;
      border:1px solid #cbd5e1;box-shadow:0 16px 42px rgba(15,23,42,.28);
      padding:14px;
    }
    .search-modal-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
    .search-result-table{width:100%;border-collapse:collapse;font-size:13px}
    .search-result-table th,.search-result-table td{border:1px solid #dbe3ef;padding:7px 8px;text-align:left}
    .search-result-table th{background:#f1f5fb;color:#334155;font-weight:900}
    .search-result-table tr:hover{background:#f8fbff}
    .name-input{
      border:1px solid #cbd5e1;border-radius:6px;padding:8px 10px;
      font-size:14px;font-family:inherit;min-width:180px;background:#fff;
    }
    .template-select{
      border:1px solid #cbd5e1;border-radius:6px;padding:8px 10px;
      font-size:14px;font-family:inherit;min-width:240px;background:#fff;
    }
    .btn{
      border:none;border-radius:6px;padding:10px 16px;cursor:pointer;
      background:var(--blue);color:#fff;font-size:14px;font-weight:700;
    }
    .btn:disabled{opacity:.6;cursor:not-allowed;pointer-events:none;filter:saturate(.5);}
    .btn:hover{background:var(--blue-dk)}
    .btn.alt{background:#64748b}
    .btn.alt:hover{background:#475569}
    .btn-spinner{
      width:13px;height:13px;border:2px solid rgba(255,255,255,.45);
      border-top-color:#fff;border-radius:50%;display:inline-block;vertical-align:-2px;
      margin-right:6px;animation:woSpin 1s linear infinite;
    }
    @keyframes woSpin{to{transform:rotate(360deg)}}
    .grid{display:grid;grid-template-columns:minmax(500px,1fr) minmax(820px,1.15fr);gap:16px;align-items:start;min-width:1280px}
    .card{background:var(--card);border-radius:8px;overflow:hidden;box-shadow:0 2px 10px rgba(15,23,42,.08);min-height:0}
    .hdr{padding:12px 16px;background:#f7f9fc;border-bottom:1px solid var(--line);font-size:16px;font-weight:800}
    .form{padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;max-height:calc(100vh - 190px);overflow:auto}
    .field{display:flex;flex-direction:column;gap:5px}
    .field.full{grid-column:1 / span 2}
    .field label{font-size:13px;font-weight:700;color:var(--muted)}
    .inp{
      border:1px solid #cbd5e1;border-radius:6px;padding:9px 10px;
      font-size:14px;font-family:inherit;outline:none;background:#fff;
    }
    .inp:focus{border-color:var(--blue)}
    .portal-date-input{min-width:10.5em;}
    .paper-wrap{padding:18px;background:#e2e8f0;overflow:auto;max-height:calc(100vh - 190px)}
    .paper{
      width:100%;max-width:198mm;min-height:297mm;background:#fff;margin:0 auto;
      border:1px solid #cbd5e1;box-shadow:0 4px 24px rgba(15,23,42,.12);padding:5mm 6mm;box-sizing:border-box;
    }
    .title{font-size:28px;font-weight:900;letter-spacing:.1em;text-align:center;margin:2mm 0 5mm}
    .meta{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #0f172a;border-left:1px solid #0f172a;margin-bottom:5mm}
    .meta-row{display:grid;grid-template-columns:28mm 1fr;border-right:1px solid #0f172a;border-bottom:1px solid #0f172a;min-height:10mm}
    .meta-label{background:#f8fafc;border-right:1px solid #0f172a;padding:2.5mm 2mm;font-size:13px;font-weight:700}
    .meta-value{padding:2.5mm 2mm;font-size:14px;font-weight:600;word-break:break-word}
    .sec{border-top:1px solid #0f172a;border-left:1px solid #0f172a;margin-bottom:4mm}
    .sec-row{display:grid;grid-template-columns:28mm 1fr;border-right:1px solid #0f172a;border-bottom:1px solid #0f172a}
    .sec-label{background:#f8fafc;border-right:1px solid #0f172a;padding:2.5mm 2mm;font-size:13px;font-weight:700}
    .sec-body{padding:2.5mm 3mm;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
    .sec-body.req{min-height:6mm}
    .sec-body.mid{min-height:17mm}
    .sec-body.long{min-height:108mm}
    .foot{margin-top:6mm;display:grid;grid-template-columns:1fr 1fr;gap:4mm}
    .sign{border:1px solid #0f172a;min-height:16mm;padding:2.5mm 3mm;font-size:13px}
    .sign-gap{min-height:10mm}
    .meta-extra{border-top:1px solid #0f172a;border-left:1px solid #0f172a;margin-bottom:5mm}
    .meta-extra-row{display:grid;grid-template-columns:28mm 1fr;border-right:1px solid #0f172a;border-bottom:1px solid #0f172a;min-height:10mm}
    .meta-extra-label{background:#f8fafc;border-right:1px solid #0f172a;padding:2.5mm 2mm;font-size:13px;font-weight:700}
    .meta-extra-value{padding:2.5mm 2mm;font-size:14px;font-weight:600;word-break:break-word}
    .issue-row{margin-top:4mm;display:flex;justify-content:space-between;align-items:flex-end;gap:8mm}
    .issue-left{font-size:12px;color:#334155}
    .issue{font-size:12px;color:#334155;text-align:right}
    .logo-foot{margin-top:5mm;display:flex;justify-content:flex-end;align-items:center;}
    .logo-foot img{max-width:86mm;max-height:13mm;object-fit:contain;}
    @media (max-width:1200px){
      .paper{width:min(210mm,100%)}
    }
    @media print{
      @page{size:A4;margin:6mm;}
      html,body{margin:0;padding:0;background:#fff !important;}
      .top,#db-status,.search-modal,
      .grid > .card:first-child,
      .grid > .card:last-child > .hdr{
        display:none !important;
      }
      .wrap,
      .grid,
      .grid > .card:last-child,
      .paper-wrap{
        margin:0 !important;
        padding:0 !important;
        max-width:none !important;
        min-width:0 !important;
        width:auto !important;
        background:transparent !important;
        border:none !important;
        box-shadow:none !important;
        overflow:visible !important;
      }
      #paper{
        position:static;
        width:198mm;
        min-height:277mm;
        margin:0;
        box-shadow:none !important;
        border:1px solid #0f172a !important;
        padding:5mm 6mm;
        box-sizing:border-box;
      }
      .name-input{display:none !important;}
      .title{font-size:28px;margin:1mm 0 3mm}
      .meta{margin-bottom:3mm}
      .meta-row{min-height:8mm}
      .meta-label,.meta-value,.sec-label,.sec-body,.meta-extra-label,.meta-extra-value{font-size:14px}
      .sec{margin-bottom:2mm}
      .sec-body.req{min-height:3mm}
      .sec-body.mid{min-height:12mm}
      .sec-body.long{min-height:87mm}
      .foot{margin-top:3mm}
      .sign{min-height:11mm;font-size:13px}
      .sign-gap{min-height:4mm}
      .meta-extra{margin-bottom:3mm}
      .meta-extra-row{min-height:8mm}
      .issue-row{margin-top:2mm}
      .issue-left,.issue{font-size:12px}
      .logo-foot{margin-top:2mm}
      .logo-foot img{max-width:62mm;max-height:8mm}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="index.html" onclick="return goBackOrDefault('index.html')">← ホームに戻る</a>
      <div class="actions">
        <div class="search-inline">
          <label for="loadCaseNoQuery">案件番号</label>
          <input id="loadCaseNoQuery" class="inp" type="text" placeholder="例: FK2346">
          <label for="loadCustomerQuery">顧客名</label>
          <input id="loadCustomerQuery" class="inp" type="text" placeholder="例: 〇〇ファーマ様">
          <label for="fileDate">出力日付</label>
          <input id="fileDate" class="inp inp-date portal-date-input" type="text" placeholder="YYYY-MM-DD" inputmode="numeric" pattern="\d{4}-\d{2}-\d{2}" title="PDFファイル名用（YYYY-MM-DD）">
        </div>
        <button class="btn alt" type="button" onclick="loadWorkorder(this)">案件呼び出し</button>
        <button class="btn alt" type="button" onclick="loadWorkorderList(this)">全件表示</button>
        <button class="btn alt" type="button" onclick="updateWorkorder(this)">更新保存</button>
        <button class="btn" type="button" onclick="printPdf(this)">PDF出力</button>
        <button class="btn alt" type="button" onclick="resetForm()">リセット</button>
      </div>
    </div>
    <div id="db-status" style="margin:-2px 0 10px;font-size:12px;color:#475569;">DB状態: 未接続</div>

    <div class="grid">
      <div class="card">
        <div class="hdr">作業指示書 入力</div>
        <div class="form">
          <div class="field full">
            <label>テンプレート</label>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <select id="templateSelect" class="template-select" onchange="applyTemplateFromSelect()" style="flex:1;min-width:220px;">
                <option value="">テンプレートを選択</option>
              </select>
              <button type="button" class="btn alt" onclick="saveCurrentAsTemplate(this)">テンプレートとして保存</button>
              <button type="button" class="btn alt" onclick="deleteSelectedTemplate(this)">テンプレート削除</button>
            </div>
          </div>
          <div class="field">
            <label for="requester">作業依頼者</label>
            <select id="requester" class="inp" onchange="renderPreview()">
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="field">
            <label for="contractor">作業請負者</label>
            <select id="contractor" class="inp" onchange="renderPreview()">
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="field">
            <label for="requestDate">依頼日</label>
            <input id="requestDate" class="inp portal-date-input" type="text" placeholder="YYYY-MM-DD" inputmode="numeric" pattern="\d{4}-\d{2}-\d{2}" title="YYYY-MM-DD" oninput="renderPreview()">
          </div>
          <div class="field">
            <label for="deadline">作業期限</label>
            <input id="deadline" class="inp portal-date-input" type="text" placeholder="YYYY-MM-DD" inputmode="numeric" pattern="\d{4}-\d{2}-\d{2}" title="YYYY-MM-DD" oninput="renderPreview()">
          </div>
          <div class="field">
            <label for="docCaseNo">案件番号</label>
            <input id="docCaseNo" class="inp" type="text" placeholder="例: FA000000" oninput="onDocCaseNoInput();renderPreview()">
          </div>
          <div class="field">
            <label for="customerName">顧客名</label>
            <input id="customerName" class="inp" type="text" placeholder="例: 〇〇ファーマ様" oninput="renderPreview()">
          </div>
          <div class="field">
            <label for="workDept">作業部署</label>
            <select id="workDept" class="inp" onchange="renderPreview()">
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="field">
            <label for="workPlace">作業場所</label>
            <select id="workPlace" class="inp" onchange="renderPreview()">
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="field full">
            <label for="request">依頼事項</label>
            <textarea id="request" class="inp" rows="4" oninput="renderPreview()"></textarea>
          </div>
          <div class="field full">
            <label for="work">作業内容</label>
            <textarea id="work" class="inp" rows="16" oninput="renderPreview()"></textarea>
          </div>
          <div class="field">
            <label for="note">備考</label>
            <textarea id="note" class="inp" rows="2" oninput="renderPreview()"></textarea>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="hdr">帳票プレビュー（A4）</div>
        <div class="paper-wrap">
          <div class="paper" id="paper">
            <div class="title">作業指示書</div>
            <div class="meta">
              <div class="meta-row"><div class="meta-label">作業依頼者</div><div class="meta-value" id="pRequester">　</div></div>
              <div class="meta-row"><div class="meta-label">作業請負者</div><div class="meta-value" id="pContractor">　</div></div>
              <div class="meta-row"><div class="meta-label">依頼日</div><div class="meta-value" id="pRequestDate">　</div></div>
              <div class="meta-row"><div class="meta-label">作業期限</div><div class="meta-value" id="pDeadline">　</div></div>
              <div class="meta-row"><div class="meta-label">案件番号</div><div class="meta-value" id="pDocCaseNo">　</div></div>
              <div class="meta-row"><div class="meta-label">顧客名</div><div class="meta-value" id="pCustomerName">　</div></div>
            </div>
            <div class="sec">
              <div class="sec-row"><div class="sec-label">依頼事項</div><div class="sec-body req" id="pRequest">　</div></div>
            </div>
            <div class="sec">
              <div class="sec-row"><div class="sec-label">作業内容</div><div class="sec-body long" id="pWork">　</div></div>
            </div>
            <div class="sec">
              <div class="sec-row"><div class="sec-label">備考</div><div class="sec-body mid" id="pNote">　</div></div>
            </div>
            <div class="foot">
              <div class="sign">依頼者 署名：</div>
              <div class="sign">請負者 署名：</div>
            </div>
            <div class="sign-gap"></div>
            <div class="meta-extra">
              <div class="meta-extra-row"><div class="meta-extra-label">作業部署</div><div class="meta-extra-value" id="pWorkDept">　</div></div>
              <div class="meta-extra-row"><div class="meta-extra-label">作業場所</div><div class="meta-extra-value" id="pWorkPlace">　</div></div>
            </div>
            <div class="issue-row">
              <div class="issue-left">指示書_単数件A様式</div>
              <div class="issue" id="issued"></div>
            </div>
            <div class="logo-foot"><img src="https://www.jpnext.co.jp/wp-content/uploads/footer_logo01.png" alt="JP NEXT ロゴ"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="searchModal" class="search-modal" onclick="closeSearchModalOnBackdrop(event)">
    <div class="search-modal-card">
      <div class="search-modal-head">
        <div style="font-size:16px;font-weight:900;">検索候補から選択</div>
        <button class="btn alt" type="button" onclick="closeSearchModal()">閉じる</button>
      </div>
      <div id="searchResultMeta" style="font-size:12px;color:#475569;margin-bottom:8px;"></div>
      <table class="search-result-table">
        <thead>
          <tr>
            <th style="width:50px;">選択</th>
            <th style="width:170px;">案件番号</th>
            <th>顧客名</th>
            <th style="width:190px;">保存日時</th>
          </tr>
        </thead>
        <tbody id="searchResultBody"></tbody>
      </table>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px;">
        <button class="btn alt" type="button" onclick="closeSearchModal()">キャンセル</button>
        <button class="btn" type="button" onclick="applySelectedSearchResult()">この案件を呼び出す</button>
      </div>
    </div>
  </div>

  <script src="portal-date-utils.js"></script>
  <script>
    function goBackOrDefault(fallbackUrl){
      try{
        if(window.history.length > 1){
          window.history.back();
          return false;
        }
      }catch(_e){}
      window.location.href = fallbackUrl || "index.html";
      return false;
    }
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzueRIitHcmbZIjfS1iT7qsAY3awEHioinFms0NO6e9ieVtlJY-ekogHjzmwDhZjUfyBA/exec";
    const DEFAULT_MEMBER_OPTIONS = [];
    const DEFAULT_WORK_DEPARTMENTS = ["ジェイピーネクスト株式会社　製造部　製造課"];
    const DEFAULT_WORK_PLACES = ["テックセンタ"];
    const WORKORDER_DEPARTMENTS_KEY = "workorder_departments_json";
    const WORKORDER_PLACES_KEY = "workorder_places_json";
    const WORKORDER_DB_SPREADSHEET_KEY = "workorder_db_spreadsheet_id";
    const WORKORDER_DB_GAS_URL_KEY = "workorder_db_gas_url";
    const WORKORDER_TEMPLATES_KEY = "workorder_templates_json";
    let _workorderDbSpreadsheetId = "";
    let _workorderDbGasUrl = "";
    let _workorderTemplates = [];
    let _workorderRecordId = "";
    let _loadedCaseNo = "";
    let _searchCandidates = [];
    const $ = id => document.getElementById(id);
    const val = id => { const el = $(id); return el ? String(el.value || "").trim() : ""; };
    const setVal = (id, value) => { const el = $(id); if(el) el.value = value == null ? "" : String(value); };
    const textOrSpace = v => (String(v || "").trim() || "　");
    function gasPost(url, payload){
      return fetch(url,{
        method:"POST",
        mode:"no-cors",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:"data="+encodeURIComponent(JSON.stringify(payload))
      });
    }
    function getPortalOperatorName(){
      return String(sessionStorage.getItem("portal_operator_name") || "").trim();
    }
    function getPortalOperatorWorkorderLabel(){
      return String(sessionStorage.getItem("portal_operator_workorder_label") || getPortalOperatorName() || "").trim();
    }
    function applyOperatorAutoFill(){
      const label = getPortalOperatorWorkorderLabel();
      const req = $("requester");
      if(label && req && !String(req.value || "").trim()){
        for(const opt of req.options){
          if(String(opt.value || "").trim() === label){
            req.value = opt.value;
            break;
          }
        }
      }
      renderPreview();
    }
    function postPortalAuditPayload(payloadObj, after){
      const body = "data=" + encodeURIComponent(JSON.stringify(payloadObj));
      let sent = false;
      if(typeof navigator.sendBeacon === "function"){
        try{
          sent = navigator.sendBeacon(GAS_URL, new Blob([body], { type: "application/x-www-form-urlencoded;charset=UTF-8" }));
        }catch(_){}
      }
      if(!sent){
        fetch(GAS_URL, {
          method:"POST",
          mode:"no-cors",
          headers:{"Content-Type":"application/x-www-form-urlencoded"},
          body
        }).catch(()=>{});
      }
      if(typeof after === "function") setTimeout(after, sent ? 0 : 80);
    }
    function logPortalAudit(action, target, detail, after){
      const operator = getPortalOperatorName();
      if(!operator){
        if(typeof after === "function") after();
        return;
      }
      const pageName = location.pathname.split("/").pop() || "workorder.html";
      const detailObj = detail && typeof detail === "object"
        ? {...detail, page: detail.page || pageName}
        : { message: String(detail || ""), page: pageName };
      postPortalAuditPayload({
        sheet:"監査ログ",
        action: String(action || "操作"),
        target: String(target || ""),
        detail: detailObj,
        operator
      }, after);
    }
    function isSameTabInternalNav(anchor, href){
      if(!href || href === "#" || href.startsWith("javascript:") || href.startsWith("blob:")) return false;
      if(anchor.target === "_blank" || anchor.hasAttribute("target")) return false;
      if(href.startsWith("mailto:") || href.startsWith("tel:")) return false;
      if(/^https?:\/\//i.test(href)) return false;
      return true;
    }
    function setupPortalAuditCapture(){
      document.addEventListener("click", (ev) => {
        if(!getPortalOperatorName()) return;
        const anchor = ev.target.closest("a[href]");
        if(!anchor) return;
        const href = String(anchor.getAttribute("href") || "").trim();
        if(!href || href === "#" || href.startsWith("javascript:") || href.startsWith("blob:")) return;
        const label = String(anchor.textContent || "").replace(/\s+/g, " ").trim().slice(0, 80) || href;
        const detail = { href, kind: "link", opensNewTab: anchor.target === "_blank" };
        if(isSameTabInternalNav(anchor, href)){
          ev.preventDefault();
          logPortalAudit("リンククリック", label, detail, () => { location.href = href; });
          return;
        }
        logPortalAudit("リンククリック", label, detail);
      }, true);
    }
    function fmtDate(v){
      return PortalDate.normalizePortalDateValue(v);
    }
    function nowStr(){
      return PortalDate.portalNowDateTime();
    }
    function renderPreview(){
      $("pRequester").textContent = textOrSpace($("requester").value);
      $("pContractor").textContent = textOrSpace($("contractor").value);
      $("pRequestDate").textContent = textOrSpace(fmtDate($("requestDate").value));
      $("pDeadline").textContent = textOrSpace(fmtDate($("deadline").value));
      $("pDocCaseNo").textContent = textOrSpace($("docCaseNo").value);

    function pickFirstRowValue(row, keys){
      for(const key of keys){

    function toDateInputValue(v){
      const raw = String(v || "").trim();
      if(!raw) return "";
      const p2 = n => String(Number(n || 0)).padStart(2, "0");
      const half = raw
        .replace(/[０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 65248))
        .replace(/／/g, "/")
        .replace(/－/g, "-")
        .replace(/[　\t]+/g, " ")
        .trim();
      const mIso = half.match(/^(\d{4})-(\d{1,2})-(\d{1,2})(?:[T\s].*)?$/);
      if(mIso) return `${mIso[1]}-${p2(mIso[2])}-${p2(mIso[3])}`;
      const mSep = half.match(/^(\d{4})[\/\.\-](\d{1,2})[\/\.\-](\d{1,2})(?:\D.*)?$/);
      if(mSep) return `${mSep[1]}-${p2(mSep[2])}-${p2(mSep[3])}`;
      return "";
    }

      if(m) return `${m[1]}-${p2(m[2])}-${p2(m[3])} ${p2(m[4])}:${p2(m[5])}`;
      const d = new Date(raw);

      }
      if(!_workorderRecordId){
        alert("先に「案件呼び出し」で既存データを読み込んでから更新してください。");
        return;
      }
      setActionLoading(btn, true, "保存中");
      try{
        const ok = await saveWorkorderToGas({ forceUpdate: true, silent: true });
        if(ok) alert("更新保存しました。");
      }finally{
        setActionLoading(btn, false);
      }
    }
    async function printPdf(btn){
      renderPreview();
      setActionLoading(btn, true, "保存・出力中");
      const prevTitle = document.title;
      const datePart = fileDateToken(val("fileDate"));
      const casePart = safeFileName(val("docCaseNo"));
      if(!datePart){
        alert("ファイル名用の出力日付を入力してください。");
        setActionLoading(btn, false);
        return;
      }
      if(!casePart){
        alert("案件番号を入力してください。");
        setActionLoading(btn, false);
        return;
      }
      const saved = await saveWorkorderToGas({ silent: true, forceUpdate: !!_workorderRecordId });
      if(!saved){
        alert("作業指示書DBへの保存に失敗したため、PDF出力を中止しました。設定画面の連携先を確認してください。");
        setActionLoading(btn, false);
        return;
      }
      document.title = `${casePart}_${datePart}_作業指示書`;
      const restore = () => {
        document.title = prevTitle;
        window.removeEventListener("afterprint", restore);
        setActionLoading(btn, false);
      };
      window.addEventListener("afterprint", restore);
      window.print();
      logPortalAudit("PDF出力", casePart, { kind: "workorder_pdf", caseNo: casePart });
      setTimeout(() => setActionLoading(btn, false), 3000);
    }
    $("requestDate").value = PortalDate.getTodayIsoDate();
    $("fileDate").value = PortalDate.getTodayIsoDate();
    loadMasterOptions();
    resetForm();
    renderPreview();
    logPortalAudit("ページ表示", "作業指示書", { kind: "page_view" });
    setupPortalAuditCapture();
  </script>
</body>
</html>
