<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>送状作成</title>
  <style>
    :root{
      --bg:#eef4fb;
      --card:#fff;
      --line:#d6dde8;
      --text:#0f172a;
      --muted:#475569;
      --blue:#0a5ec2;
      --blue-dk:#084892;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;color:var(--text)}
    .wrap{max-width:1780px;margin:0 auto;padding:22px;overflow-x:auto}
    .top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .back{font-size:15px;font-weight:800;color:var(--blue);text-decoration:none}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:none;border-radius:6px;padding:11px 16px;font-size:14px;font-weight:800;color:#fff;background:var(--blue);cursor:pointer}
    .btn.alt{background:#64748b}
    .btn:hover{background:var(--blue-dk)}
    .btn.alt:hover{background:#475569}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .actions .search-inline{
      display:flex;align-items:center;gap:6px;
      padding:7px 8px;
      border:1px solid #cbd5e1;
      border-radius:8px;
      background:#f8fafc;
    }
    .actions .search-inline label{
      font-size:12px;font-weight:800;color:#334155;white-space:nowrap;
    }
    .actions .search-inline .inp{
      width:170px;min-width:120px;height:34px;padding:6px 8px;font-size:13px;
    }
    .search-modal{
      position:fixed;inset:0;z-index:9999;
      display:none;align-items:center;justify-content:center;
      background:rgba(15,23,42,.38);
    }
    .search-modal.open{display:flex}
    .search-modal-card{
      width:min(860px,92vw);max-height:78vh;overflow:auto;
      background:#fff;border-radius:10px;
      border:1px solid #cbd5e1;box-shadow:0 16px 42px rgba(15,23,42,.28);
      padding:14px;
    }
    .search-modal-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
    .search-result-table{width:100%;border-collapse:collapse;font-size:13px}
    .search-result-table th,.search-result-table td{border:1px solid #dbe3ef;padding:7px 8px;text-align:left}
    .search-result-table th{background:#f1f5fb;color:#334155;font-weight:900}
    .search-result-table tr:hover{background:#f8fbff}
    .grid{display:grid;grid-template-columns:minmax(520px,1fr) minmax(860px,1.2fr);gap:14px;min-width:1320px}
    .card{background:var(--card);border-radius:8px;overflow:hidden;box-shadow:0 2px 10px rgba(15,23,42,.08)}
    .hdr{padding:13px 16px;background:#f7f9fc;border-bottom:1px solid var(--line);font-size:18px;font-weight:900}
    .form{padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;max-height:calc(100vh - 190px);overflow:auto}
    .field{display:flex;flex-direction:column;gap:5px}
    .field.full{grid-column:1/span 2}
    .field label{font-size:13px;font-weight:800;color:var(--muted);white-space:nowrap}
    .field.checkline{flex-direction:row;align-items:center;gap:8px}
    .field.checkline label{font-size:13px;font-weight:800;color:#1f2937}
    .chk{width:16px;height:16px;accent-color:var(--blue)}
    .inp{border:1px solid #cbd5e1;border-radius:6px;padding:9px 11px;font-size:14px;font-family:inherit;background:#fff;outline:none}
    .inp:focus{border-color:var(--blue)}
    .portal-date-input{min-width:10.5em;}
    .portal-date-input{min-width:10.5em;}
    .items-grid{display:grid;grid-template-columns:1fr 170px;gap:6px}
    .items-head{font-size:12px;font-weight:900;color:#475569}
    .qty-with-unit{display:grid;grid-template-columns:1fr 58px;gap:6px}
    .qty-unit{height:100%}

    .paper-wrap{padding:18px;background:#e2e8f0;overflow:auto;max-height:calc(100vh - 190px)}
    .sheet{
      width:198mm;max-width:198mm;min-height:273mm;background:#fff;margin:0 auto 7mm;
      border:1px solid #cbd5e1;box-shadow:0 4px 24px rgba(15,23,42,.12);padding:5mm;box-sizing:border-box;
      page-break-after:always;
    }
    .title-row{
      display:flex;
      align-items:baseline;
      justify-content:center;
      gap:10px;
      margin:0 0 1.5mm;
    }
    .title{font-size:25px;font-weight:900;text-align:center;letter-spacing:.08em;margin:0}
    .copy-inline{font-size:15px;font-weight:900;color:#0f172a;line-height:1}
    table{width:100%;border-collapse:collapse;table-layout:fixed}
    td,th{border:1px solid #111;padding:1.55mm 1.9mm;vertical-align:middle;font-size:12.7px}
    th{background:#e5edf7;text-align:left}
    .label{width:20%;background:#e5edf7;font-weight:900}
    .value{font-weight:800}
    .mt{margin-top:1.9mm}
    .major-head{
      background:#d7e3f4;
      border:1.6px solid #111;
      border-bottom:none;
      padding:1.05mm 1.8mm;
      font-size:13.1px;
      font-weight:900;
      letter-spacing:.04em;
      color:#0f172a;
    }
    .major-table td,.major-table th{border:1.6px solid #111}
    .destination-table .label{width:22%}
    .item-table th{font-size:13.5px}
    .item-table td{padding:1.65mm 1.9mm}
    .item-name{height:8.4mm}
    .caution-box{
      margin-top:2.0mm;
      border:2.2px solid #111;
      background:#eaf1fb;
      border-radius:2px;
      padding:1.7mm 2.1mm;
    }
    .caution-title{font-size:13.2px;font-weight:900;margin-bottom:0.9mm}
    .caution-body{font-size:12.3px;font-weight:800;line-height:1.52;white-space:pre-wrap}
    .minor-table td,.minor-table th{border:1px solid #111}
    .minor-table .label{background:#eef2f7}
    .small{font-size:11.8px;line-height:1.55;color:#1f2937}
    .sender-head{
      font-size:12px;
      padding:1.2mm 1.8mm;
    }
    .sender-table td,.sender-table th{
      font-size:11.4px;
      padding:1.15mm 1.55mm;
      line-height:1.35;
    }
    .sender-table .label{width:20%}
    .head-row{
      display:grid;
      grid-template-columns:minmax(0,1fr) 52mm;
      gap:1.2mm;
      margin-bottom:1.8mm;
      align-items:stretch;
    }
    .head-meta-table{
      height:auto;
    }
    .head-meta-table .label{
      width:22%;
      background:#e5edf7;
      font-weight:900;
    }
    .head-meta-table td{
      border:1px solid #111;
      height:auto;
      padding:1.55mm 1.9mm;
      font-size:12.7px;
      line-height:1.4;
    }
    .head-meta-table .value{
      font-size:12.7px;
      font-weight:800;
      letter-spacing:0;
    }
    .sign-panel{
      width:52mm;
      height:auto;
      border:1px solid #111;
      display:flex;
      flex-direction:column;
      background:#fff;
    }
    .sign-panel-title{
      border-bottom:1px solid #111;
      background:#e5edf7;
      font-size:12px;
      font-weight:900;
      padding:1.0mm 1.4mm;
      line-height:1.1;
    }
    .sign-panel-box{
      flex:1;
      position:relative;
      min-height:14mm;
    }
    .stamp-hint{
      position:absolute;
      right:2.6mm;
      top:50%;
      transform:translateY(-50%);
      color:rgba(71,85,105,.28);
      font-size:14px;
      font-weight:900;
      letter-spacing:.02em;
      user-select:none;
    }
    .sender-sign-hint{
      display:inline-block;
      margin-left:10mm;
      color:rgba(71,85,105,.28);
      font-size:13px;
      font-weight:900;
      letter-spacing:.02em;
      user-select:none;
    }
    .nowrap{white-space:nowrap}
    .pre{white-space:pre-wrap}
    .footer-bar{
      margin-top:2.0mm;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:4mm;
    }
    .brand-logo img{display:block;width:33mm;max-width:100%;height:auto}
    .company{font-size:10.6px;line-height:1.44;color:#1f2937;text-align:right}
    @media print{
      body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
      @page{size:A4;margin:6mm}
      .top,#db-status,.grid>.card:first-child,.grid>.card:last-child>.hdr{display:none !important}
      .wrap,.grid,.grid>.card:last-child,.paper-wrap{margin:0 !important;padding:0 !important;max-width:none !important;min-width:0 !important;width:auto !important;background:transparent !important;box-shadow:none !important;border:none !important;overflow:visible !important}
      .grid{display:block !important}
      .sheet{box-shadow:none !important;border:1px solid #111 !important;padding:4.6mm;min-height:272mm}
      .title-row{margin:0 0 1.2mm}
      .title{font-size:23px}
      .copy-inline{font-size:15px}
      td,th{padding:1.45mm 1.75mm;font-size:12.4px}
      .major-head{padding:0.95mm 1.7mm;font-size:12.8px}
      .item-name{height:7.8mm}
      .caution-title{font-size:12.8px}
      .caution-body{font-size:12px;line-height:1.48}
      .brand-logo img{width:31mm}
      .company{font-size:10.2px;line-height:1.4}
      .sender-head{font-size:11.6px;padding:1.1mm 1.7mm}
      .sender-table td,.sender-table th{font-size:11.1px;padding:1.05mm 1.45mm}
      .head-row{grid-template-columns:minmax(0,1fr) 52mm;gap:1.1mm}
      .head-meta-table{height:auto}
      .sign-panel{width:52mm;height:auto}
      .sign-panel-box{min-height:13mm}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="transport-order.html" onclick="return goBackOrDefault('transport-order.html')">← 運送手配表へ戻る</a>
      <div class="actions">
        <div class="search-inline">
          <label for="loadCaseNoQuery">案件番号</label>
          <input id="loadCaseNoQuery" class="inp" type="text" placeholder="例: FK2346">
          <label for="loadNameQuery">発送先名</label>
          <input id="loadNameQuery" class="inp" type="text" placeholder="例: 上組 名古屋">
        </div>
        <button class="btn alt" onclick="loadShippingSlip(this)">案件呼び出し</button>
        <button class="btn alt" onclick="loadShippingList(this)">全件表示</button>
        <button class="btn alt" onclick="saveShippingSlip(this)">更新保存</button>
        <button class="btn" onclick="printWithAutoSave(this)">PDF出力</button>
        <button class="btn alt" onclick="resetSlip()">リセット</button>
      </div>
    </div>
    <div id="db-status" style="margin:-2px 0 10px;font-size:12px;color:#475569;">DB状態: 未接続</div>

    <div class="grid">
      <div class="card">
        <div class="hdr">送状 入力</div>
        <div class="form">
          <div class="field"><label>発送日</label><input id="requestDate" class="inp portal-date-input" type="text" placeholder="YYYY-MM-DD" inputmode="numeric" pattern="\d{4}-\d{2}-\d{2}" title="YYYY-MM-DD" oninput="renderPreview()"></div>
          <div class="field"><label>案件番号</label><input id="caseNo" class="inp" type="text" oninput="renderPreview()"></div>

          <div class="field"><label>運送会社</label><input id="carrierCompany" class="inp" type="text" oninput="renderPreview()"></div>
          <div class="field"><label>車番</label><input id="vehicleNo" class="inp" type="text" oninput="renderPreview()"></div>

          <div class="field"><label>ドライバー</label><input id="driverName" class="inp" type="text" oninput="renderPreview()"></div>
          <div class="field"><label>携帯番号</label><input id="driverMobile" class="inp" type="text" oninput="renderPreview()"></div>

          <div class="field"><label>会社名</label><input id="destinationCompany" class="inp" type="text" oninput="renderPreview()"></div>
          <div class="field"><label>送り先 部署名</label><input id="destinationDept" class="inp" type="text" oninput="onDestinationContactFieldInput()"></div>
          <div class="field"><label>送り先 担当者名</label><input id="destinationContact" class="inp" type="text" oninput="onDestinationContactFieldInput()"></div>
          <div class="field full checkline">
            <input id="destinationNoHonorific" class="chk" type="checkbox" onchange="renderPreview()">
            <label for="destinationNoHonorific">敬称なし</label>
          </div>

          <div class="field"><label>送り先 郵便番号</label><input id="destinationPostal" class="inp" type="text" placeholder="〒000-0000" oninput="renderPreview()"></div>
          <div class="field"><label>到着日/時間</label><input id="arrivalDateTime" class="inp" type="text" oninput="renderPreview()"></div>

          <div class="field full"><label>送り先 住所</label><textarea id="destinationAddress" class="inp" rows="2" oninput="renderPreview()"></textarea></div>
          <div class="field"><label>送り先 TEL</label><input id="destinationTel" class="inp" type="text" oninput="onDestinationContactFieldInput()"></div>

          <div class="field full">
            <label>品目 / 個数</label>
            <div class="items-grid items-head"><div>品名</div><div>個数</div></div>
            <div class="items-grid">
              <input id="itemName1" class="inp" type="text" oninput="renderPreview()">
              <div class="qty-with-unit">
                <input id="itemQty1" class="inp" type="text" oninput="renderPreview()">
                <select id="itemQtyUnit1" class="inp qty-unit" onchange="renderPreview()"><option value="個">個</option><option value="式">式</option></select>
              </div>
            </div>
            <div class="items-grid">
              <input id="itemName2" class="inp" type="text" oninput="renderPreview()">
              <div class="qty-with-unit">
                <input id="itemQty2" class="inp" type="text" oninput="renderPreview()">
                <select id="itemQtyUnit2" class="inp qty-unit" onchange="renderPreview()"><option value="個">個</option><option value="式">式</option></select>
              </div>
            </div>
            <div class="items-grid">
              <input id="itemName3" class="inp" type="text" oninput="renderPreview()">
              <div class="qty-with-unit">
                <input id="itemQty3" class="inp" type="text" oninput="renderPreview()">
                <select id="itemQtyUnit3" class="inp qty-unit" onchange="renderPreview()"><option value="個">個</option><option value="式">式</option></select>
              </div>
            </div>
            <div class="items-grid">
              <input id="itemName4" class="inp" type="text" oninput="renderPreview()">
              <div class="qty-with-unit">
                <input id="itemQty4" class="inp" type="text" oninput="renderPreview()">
                <select id="itemQtyUnit4" class="inp qty-unit" onchange="renderPreview()"><option value="個">個</option><option value="式">式</option></select>
              </div>
            </div>
            <div class="items-grid">
              <input id="itemName5" class="inp" type="text" oninput="renderPreview()">
              <div class="qty-with-unit">
                <input id="itemQty5" class="inp" type="text" oninput="renderPreview()">
                <select id="itemQtyUnit5" class="inp qty-unit" onchange="renderPreview()"><option value="個">個</option><option value="式">式</option></select>
              </div>
            </div>
          </div>

          <div class="field full"><label>注意事項</label><textarea id="caution" class="inp" rows="2" oninput="renderPreview()"></textarea></div>
          <div class="field full checkline">
            <input id="cautionSameAsDestination" class="chk" type="checkbox" onchange="onCautionSameAsDestinationChanged()">
            <label for="cautionSameAsDestination">送り先担当者と同様の場合はチェック</label>
          </div>
          <div class="field"><label>部署名</label><input id="cautionReceiverDept" class="inp" type="text" oninput="renderPreview()"></div>
          <div class="field"><label>担当者名</label><input id="cautionReceiverName" class="inp" type="text" oninput="renderPreview()"></div>
          <div class="field"><label>連絡先</label><input id="cautionReceiverTel" class="inp" type="text" oninput="renderPreview()"></div>
          <div class="field"><label>補足注意</label><input id="cautionNote" class="inp" type="text" oninput="renderPreview()"></div>

          <div class="field"><label>依頼元 会社名</label><input id="senderCompany" class="inp" type="text" oninput="renderPreview()"></div>
          <div class="field"><label>依頼元担当者</label><input id="senderName" class="inp" type="text" oninput="renderPreview()"></div>
          <div class="field full"><label>依頼元 住所</label><textarea id="senderAddress" class="inp" rows="2" oninput="renderPreview()"></textarea></div>
          <div class="field"><label>依頼元 TEL</label><input id="senderTel" class="inp" type="text" oninput="renderPreview()"></div>
          <div class="field full"><label>備考</label><textarea id="remarks" class="inp" rows="2" oninput="renderPreview()"></textarea></div>
        </div>
      </div>

      <div class="card">
        <div class="hdr">帳票プレビュー（3枚）</div>
        <div class="paper-wrap" id="slipPages"></div>
      </div>
    </div>
  </div>
  <div class="search-modal" id="searchModal" onclick="closeSearchModalOnBackdrop(event)">
    <div class="search-modal-card">
      <div class="search-modal-head">
        <div style="font-size:16px;font-weight:900;">検索候補から選択</div>
        <button class="btn alt" type="button" onclick="closeSearchModal()">閉じる</button>
      </div>
      <div id="searchResultMeta" style="font-size:12px;color:#475569;margin-bottom:8px;"></div>
      <table class="search-result-table">
        <thead>
          <tr>
            <th style="width:50px;">選択</th>
            <th style="width:170px;">案件番号</th>
            <th>配送先名</th>
            <th style="width:190px;">保存日時</th>
          </tr>
        </thead>
        <tbody id="searchResultBody"></tbody>
      </table>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px;">
        <button class="btn alt" type="button" onclick="closeSearchModal()">キャンセル</button>
        <button class="btn" type="button" onclick="applySelectedSearchResult()">この案件を呼び出す</button>
      </div>
    </div>
  </div>

  <script src="portal-date-utils.js"></script>
  <script>
    function goBackOrDefault(fallbackUrl){
      try{
        if(window.history.length > 1){
          window.history.back();
          return false;
        }
      }catch(_e){}
      window.location.href = fallbackUrl || "transport-order.html";
      return false;
    }
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzueRIitHcmbZIjfS1iT7qsAY3awEHioinFms0NO6e9ieVtlJY-ekogHjzmwDhZjUfyBA/exec";
    const TRANSPORT_DB_SPREADSHEET_KEY = "transport_db_spreadsheet_id";
    const TRANSPORT_DB_GAS_URL_KEY = "transport_db_gas_url";
    let _transportDbSpreadsheetId = "";
    let _transportDbGasUrl = "";
    let _slipRecordId = "";
    let _searchCandidates = [];
    const $ = id => document.getElementById(id);
    function val(id){ const el = $(id); return el ? String(el.value || "").trim() : ""; }
    function valDate(id){ return PortalDate.readPortalDateInputValue($(id)); }
    function setDbStatus(text, isError){
      const el = $("db-status");
      if(!el) return;
      el.textContent = text;
      el.style.color = isError ? "#b91c1c" : "#475569";
    }
    function setActionLoading(btn, loading, loadingText){
      if(!btn) return;
      if(loading){
        btn.disabled = true;
        btn.dataset.prevText = btn.textContent;
        btn.textContent = loadingText || "処理中...";
      }else{
        btn.disabled = false;
        btn.textContent = btn.dataset.prevText || btn.textContent;
        delete btn.dataset.prevText;
      }
    }
    function normalizeSearchText(s){
      return String(s || "")
        .toLowerCase()
        .replace(/[０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 65248))
        .replace(/[　\s]/g, "")
        .replace(/[()（）［］\[\]【】「」『』<>＜＞]/g, "")
        .replace(/[・･\.\-ー_／\/,，]/g, "");
    }
    function getCandidateDisplayName(row){
      const name = String((row && (row.unloadName || row.destinationCompany || row.unloadPlace || row.toCompany)) || "").trim();
      return name;
    }
    function formatSavedAtForList(v){
      const raw = String(v || "").trim();
      if(!raw) return "-";
      const p2 = n => String(Number(n || 0)).padStart(2, "0");
      const m = raw.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})(?:[ T](\d{1,2}):(\d{1,2}))?/);
      if(m){
        const hm = (m[4] != null && m[5] != null) ? ` ${p2(m[4])}:${p2(m[5])}` : "";
        return `${m[1]}-${p2(m[2])}-${p2(m[3])}${hm}`;
      }
      const d = new Date(raw);
      if(!Number.isNaN(d.getTime())){
        return PortalDate.formatPortalDateTimeStorage(d);
      }
      return raw;
    }
    function openSearchModal(rows, metaText){
      _searchCandidates = Array.isArray(rows) ? rows : [];
      const body = $("searchResultBody");
      const meta = $("searchResultMeta");
      const modal = $("searchModal");
      if(!body || !modal) return;
      if(meta) meta.textContent = metaText || `${_searchCandidates.length}件ヒット`;
      body.innerHTML = _searchCandidates.map((row, idx) => {
        const checked = idx === 0 ? "checked" : "";
        const caseNo = String(row.caseNo || "").trim() || "-";
        const name = getCandidateDisplayName(row) || "-";
        const savedAt = formatSavedAtForList(row.savedAt);
        return `<tr>
          <td><input type="radio" name="searchResultPick" value="${idx}" ${checked}></td>
          <td>${esc(caseNo)}</td>
          <td>${esc(name)}</td>
          <td>${esc(savedAt)}</td>
        </tr>`;
      }).join("");
      if(!_searchCandidates.length && meta){
        meta.textContent = "全件表示: 0件";
      }
      modal.classList.add("open");
    }
    function closeSearchModal(){
      const modal = $("searchModal");
      if(modal) modal.classList.remove("open");
    }
    function closeSearchModalOnBackdrop(ev){
      if(ev && ev.target && ev.target.id === "searchModal") closeSearchModal();
    }
    async function applySelectedSearchResult(){

    function postPortalAuditPayload(payloadObj, after){
      const body = "data=" + encodeURIComponent(JSON.stringify(payloadObj));
      let sent = false;
      if(typeof navigator.sendBeacon === "function"){
        try{
          sent = navigator.sendBeacon(GAS_URL, new Blob([body], { type: "application/x-www-form-urlencoded;charset=UTF-8" }));
        }catch(_){}
      }
      if(!sent){
        fetch(GAS_URL, {
          method:"POST",
          mode:"no-cors",
          headers:{"Content-Type":"application/x-www-form-urlencoded"},
          body
        }).catch(()=>{});
      }
      if(typeof after === "function") setTimeout(after, sent ? 0 : 80);
    }
    function logPortalAudit(action, target, detail, after){
      const operator = getPortalOperatorName();
      if(!operator){
        if(typeof after === "function") after();
        return;
      }
      const pageName = location.pathname.split("/").pop() || "shipping-slip.html";
      const detailObj = detail && typeof detail === "object"
        ? {...detail, page: detail.page || pageName}
        : { message: String(detail || ""), page: pageName };
      postPortalAuditPayload({
        sheet:"監査ログ",
        action: String(action || "操作"),
        target: String(target || ""),
        detail: detailObj,
        operator
      }, after);
    }
    function isSameTabInternalNav(anchor, href){
      if(!href || href === "#" || href.startsWith("javascript:") || href.startsWith("blob:")) return false;
      if(anchor.target === "_blank" || anchor.hasAttribute("target")) return false;
      if(href.startsWith("mailto:") || href.startsWith("tel:")) return false;
      if(/^https?:\/\//i.test(href)) return false;
      return true;
    }
    function setupPortalAuditCapture(){
      document.addEventListener("click", (ev) => {
        if(!getPortalOperatorName()) return;
        const anchor = ev.target.closest("a[href]");
        if(!anchor) return;
        const href = String(anchor.getAttribute("href") || "").trim();
        if(!href || href === "#" || href.startsWith("javascript:") || href.startsWith("blob:")) return;
        const label = String(anchor.textContent || "").replace(/\s+/g, " ").trim().slice(0, 80) || href;
        const detail = { href, kind: "link", opensNewTab: anchor.target === "_blank" };
        if(isSameTabInternalNav(anchor, href)){
          ev.preventDefault();
          logPortalAudit("リンククリック", label, detail, () => { location.href = href; });
          return;
        }
        logPortalAudit("リンククリック", label, detail);
      }, true);
    }

    function parseDateParts(raw){
      const s = String(raw || "").trim();
      if(!s) return null;
      let m = s.match(/^(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/);
      if(m){
        return { y:Number(m[1]), m:Number(m[2]), d:Number(m[3]) };
      }
      const dt = new Date(s);
      if(!Number.isNaN(dt.getTime())){
        return { y:dt.getFullYear(), m:dt.getMonth()+1, d:dt.getDate() };
      }
      return null;
    }
    function toDateInputValue(raw){
      const p = parseDateParts(raw);
      if(!p) return "";
      return `${p.y}-${String(p.m).padStart(2,"0")}-${String(p.d).padStart(2,"0")}`;
    }
    function fmtDateJp(v){

      return `${p.y}年${p.m}月${p.d}日`;

    async function saveShippingSlip(btn){
      const caseNo = val("caseNo");
      if(!caseNo){
        alert("案件番号を入力してください。");
        return false;
      }
      if(!_transportDbSpreadsheetId || !_transportDbGasUrl){
        alert("DB連携設定が未完了です。");
        return false;
      }
      setActionLoading(btn, true, "保存中...");
      try{
        const payload = buildShippingPayload();
        const isUpdate = payload.mode === "shipping_update";
        await gasPost(_transportDbGasUrl, payload);
        const url = `${_transportDbGasUrl}?mode=shipping_get&targetSpreadsheetId=${encodeURIComponent(_transportDbSpreadsheetId)}&caseNo=${encodeURIComponent(caseNo)}&_=${Date.now()}`;
        const r = await fetch(url, {mode:"cors"});
        const j = await r.json();
        const row = (j && (j.row || j.data)) || null;
        if(!row){
          setDbStatus("DB状態: 保存未確認", true);
          alert("保存確認ができませんでした。");
          return false;
        }
        fillSlipFromRow(row);
        setDbStatus(`DB状態: 送状保存済み（${caseNo}）`, false);
        logPortalAudit(isUpdate ? "更新保存" : "新規保存", caseNo, { kind: "shipping_save", mode: payload.mode });
        return true;
      }catch(e){
        setDbStatus("DB状態: 保存エラー", true);
        alert("送状保存でエラーが発生しました。");
        return false;
      }finally{
        setActionLoading(btn, false);
      }
    }
