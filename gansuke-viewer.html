<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>製造課 スケジュールビューア（2026/06/12 22:51更新）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f2f5;--white:#fff;--border:#dde1ea;--border2:#b8c0d0;
  --text:#1a2035;--text2:#4a5270;--text3:#9098b0;
  --accent:#1d4ed8;--acc-light:#eff3ff;
  --today:#dc2626;
  --green:#15803d;--green-bg:#dcfce7;
  --cyan:#0e7490;--cyan-bg:#cffafe;
  --red:#b91c1c;--red-bg:#fee2e2;
  --blue:#1d4ed8;--blue-bg:#dbeafe;
  --row-h:40px;--label-w:290px;--dh-h:66px;
  --dh-top-h:32px;--dh-bot-h:34px;--dh-font:12px;--dh-month-font:15px;
  --bar-h:22px;--bar-top:9px;--bar-font:12px;
  --ui-font:12px;--ui-small-font:11px;
  --event-top:3px;--event-font:15px;
  --lrow-main-font:11px;--lrow-sub-font:9px;
  --sans:'Noto Sans JP',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:var(--ui-font);}

/* ── UPLOAD ── */
#up{display:flex;align-items:center;justify-content:center;height:100vh;}
.up-card{background:var(--white);border-radius:16px;padding:48px 52px;text-align:center;width:420px;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.dz{border:2px dashed var(--border2);border-radius:10px;padding:32px;cursor:pointer;transition:.2s;background:var(--bg);margin-bottom:18px;}
.dz:hover,.dz.drag{border-color:var(--accent);background:var(--acc-light);}
.up-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px 0;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);width:100%;}
.up-btn:hover{background:#1840b0;}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden;}

/* TOPBAR */
.bar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.bar-title{font-size:calc(var(--ui-font) + 1px);font-weight:700;}
.bar-file{font-size:calc(var(--ui-small-font) - 1px);color:var(--text3);padding:2px 7px;background:var(--bg);border-radius:4px;}
.vbtns{display:flex;border:1.5px solid var(--border2);border-radius:8px;overflow:hidden;}
.vb{padding:6px 13px;font-size:var(--ui-font);font-weight:500;cursor:pointer;color:var(--text2);background:var(--white);border:none;border-right:1px solid var(--border);font-family:var(--sans);transition:.12s;white-space:nowrap;}
.vb:last-child{border-right:none;}
.vb.on{background:var(--accent);color:#fff;font-weight:700;}
.vb:hover:not(.on){background:var(--acc-light);}
.nav-btn{background:var(--white);border:1.5px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:calc(var(--ui-font) + 1px);cursor:pointer;color:var(--text2);}
.nav-btn:hover{background:var(--bg);}
.zoom-btn{width:32px;height:30px;padding:3px;display:inline-flex;align-items:center;justify-content:center;}
.zoom-icon{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.period-label{font-size:var(--dh-month-font);font-weight:700;color:var(--text);min-width:160px;text-align:center;display:inline-flex;align-items:baseline;justify-content:center;gap:3px;}
.period-label .period-year{font-size:.65em;font-weight:600;color:var(--text3);}
.period-label .period-month{font-size:1em;font-weight:700;color:var(--text);}
.period-label .period-extra{font-size:var(--dh-font);font-weight:600;color:var(--text2);}
.today-btn{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:var(--ui-font);font-weight:600;cursor:pointer;font-family:var(--sans);}
.today-btn:hover{background:#1840b0;}
.srch{display:flex;align-items:center;gap:5px;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:4px 9px;}
.srch input{border:none;background:transparent;font-size:11px;color:var(--text);outline:none;width:160px;font-family:var(--sans);}
.reset-btn{background:none;border:1.5px solid var(--border);border-radius:7px;padding:5px 11px;font-size:var(--ui-small-font);cursor:pointer;color:var(--text2);font-family:var(--sans);}
.print-btn{background:#166534;color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:var(--ui-small-font);font-weight:600;cursor:pointer;font-family:var(--sans);}
.print-btn:hover{background:#14532d;}

/* LEGEND */
.legend{display:flex;align-items:center;gap:14px;padding:4px 14px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);}
.leg-box{height:10px;width:24px;border-radius:3px;}
.leg-line{width:2px;height:14px;background:var(--today);}
.leg-note{margin-left:auto;font-size:10px;color:var(--text3);}

/* GANTT SHELL */
.shell{display:flex;flex:1;overflow:hidden;}

/* LEFT */
.lcol{width:var(--label-w);min-width:var(--label-w);flex-shrink:0;border-right:2px solid var(--border2);background:var(--white);display:flex;flex-direction:column;z-index:10;position:relative;}
.lresize{position:absolute;top:0;right:-5px;width:10px;height:100%;cursor:col-resize;z-index:25;background:transparent;}
.lresize:hover{background:rgba(29,78,216,.12);}
.lhead{height:var(--dh-h);display:flex;align-items:center;padding:0 12px;background:var(--bg);border-bottom:1.5px solid var(--border2);font-size:var(--ui-small-font);font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;}
.lbody{flex:1;overflow-y:auto;overflow-x:hidden;}
.lrow{height:var(--row-h);display:flex;flex-direction:column;justify-content:center;padding:0 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative;}
.lrow:hover{background:var(--acc-light);}
.lrow-main{font-size:var(--lrow-main-font);font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(var(--label-w) - 24px);}
.lrow-sub{font-size:var(--lrow-sub-font);color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(var(--label-w) - 24px);margin-top:1px;}
.row-resize{position:absolute;left:0;right:0;bottom:-4px;height:8px;cursor:row-resize;z-index:8;background:transparent;}
.row-resize:hover{background:rgba(29,78,216,.12);}

/* RIGHT */
.rcol{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.tl-sc{flex:1;overflow:auto;}
.tl-in{display:inline-flex;flex-direction:column;min-width:100%;position:relative;}

/* DATE HEADER */
.dh{position:sticky;top:0;z-index:15;background:var(--white);border-bottom:2px solid var(--border2);}
.dh-top{display:flex;height:var(--dh-top-h);border-bottom:1px solid var(--border);}
.dh-bot{display:flex;height:var(--dh-bot-h);}
.dhc{display:flex;align-items:center;justify-content:center;font-size:var(--dh-font);font-weight:600;color:var(--text2);border-right:1px solid var(--border);flex-shrink:0;overflow:hidden;white-space:nowrap;}
.dhc.mth{background:var(--bg);font-size:var(--dh-month-font);font-weight:700;color:var(--text);}
.dh-year{font-size:.65em;font-weight:600;color:var(--text3);margin-right:.2em;}
.dh-month{font-size:1em;font-weight:700;color:var(--text);}
.dhc.we{background:#fef9ef;color:#b45309;}
.dhc.td{background:#fef2f2;color:var(--today);font-weight:800;}

/* TL ROWS */
.trow{height:var(--row-h);position:relative;border-bottom:1px solid var(--border);flex-shrink:0;}
.trow.alt{background:#fafbfc;}
.trow:hover{background:#f0f4ff;}
.calbg{position:absolute;top:0;bottom:0;pointer-events:none;}
.calbg.we{background:rgba(251,191,36,.08);}
.calbg.td-bg{background:rgba(220,38,38,.07);}
.vl{position:absolute;top:0;bottom:0;width:1px;background:var(--border);pointer-events:none;}
.vl.td-vl{background:var(--today);width:2px;z-index:4;opacity:.85;}
.gbar{position:absolute;height:var(--bar-h);top:var(--bar-top);border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:var(--bar-font);font-weight:700;color:#fff;cursor:pointer;z-index:3;overflow:hidden;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.18);transition:filter .1s;}
.gbar:hover{filter:brightness(.88);}
.gbar.g{background:var(--green);}
.gbar.c{background:var(--cyan);}
.gbar.r{background:var(--red);}
.gbar.b{background:var(--blue);}
.gev{position:absolute;top:var(--event-top);font-size:var(--event-font);cursor:pointer;z-index:5;transform:translateX(-50%);transition:transform .1s;line-height:1;}
.gev:hover{transform:translateX(-50%) scale(1.2);}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:50;align-items:center;justify-content:center;}
.mbg.open{display:flex;}
.mcard{background:var(--white);border-radius:14px;padding:28px;width:660px;max-width:94vw;max-height:84vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.18);}
.mtitle{font-size:14px;font-weight:700;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid var(--border);line-height:1.6;}
.msec{margin-bottom:18px;}
.msec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px;}
.mtbl{width:100%;border-collapse:collapse;font-size:12px;}
.mtbl th{background:var(--bg);padding:7px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--text2);border:1px solid var(--border);}
.mtbl td{padding:7px 10px;border:1px solid var(--border);color:var(--text);vertical-align:top;}
.mtbl tr:nth-child(even) td{background:#fafbfc;}
.mbadge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;}
.mbadge.g{background:var(--green-bg);color:#166534;}
.mbadge.c{background:var(--cyan-bg);color:#155e75;}
.mbadge.r{background:var(--red-bg);color:#991b1b;}
.mbadge.b{background:var(--blue-bg);color:#1e40af;}
.mclose{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 24px;font-size:12px;cursor:pointer;font-family:var(--sans);font-weight:500;color:var(--text2);}
.mclose:hover{background:var(--border);}
.past-row{opacity:.45;}

/* TOOLTIP */
.tip{position:fixed;background:rgba(22,28,46,.93);color:#fff;border-radius:7px;padding:8px 12px;font-size:var(--bar-font);max-width:320px;z-index:100;pointer-events:none;display:none;line-height:1.8;}
.tip b{color:#93c5fd;}
/* marker legend */
.mkpanel{background:var(--white);border-bottom:2px solid var(--border);padding:0;max-height:0;overflow:hidden;transition:max-height .25s ease,padding .25s ease;flex-shrink:0;}
.mkpanel.open{max-height:200px;padding:10px 14px;}
.mkpanel-inner{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start;}
.mkitem{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:5px 10px;min-width:180px;}
.mkitem-sym{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
.mksep{font-size:11px;color:var(--text3);}
.mkinput{border:none;background:transparent;font-size:11px;color:var(--text);outline:none;font-family:var(--sans);flex:1;min-width:80px;}
.mkinput::placeholder{color:var(--text3);}
.mk-toggle{background:none;border:1.5px solid var(--border);border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;color:var(--text2);font-family:var(--sans);white-space:nowrap;}
.mk-toggle:hover{background:var(--bg);}
.mk-save{background:var(--green);color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:10px;font-weight:600;cursor:pointer;font-family:var(--sans);}
.mk-save:hover{background:#166534;}
/* sort */
.lhead{cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between;}
.lhead:hover{background:var(--acc-light);}
.sort-icon{font-size:11px;color:var(--text3);margin-left:4px;}
/* search panel */
.spanel{background:var(--white);border-bottom:1px solid var(--border);padding:6px 10px;display:none;flex-direction:column;gap:6px;flex-shrink:0;}
.spanel.open{display:flex;}
.spanel-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.sp-label{font-size:var(--ui-small-font);color:var(--text3);white-space:nowrap;}
.sp-input{flex:1;min-width:160px;border:1.5px solid var(--border2);border-radius:6px;padding:5px 8px;font-size:var(--ui-font);font-family:var(--sans);color:var(--text);outline:none;}
.sp-input:focus{border-color:var(--accent);}
.sp-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 14px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);white-space:nowrap;}
.sp-btn.clear{background:var(--bg);color:var(--text2);border:1.5px solid var(--border);}
.sp-btn.clear:hover{background:var(--border);}
.sp-count{font-size:10px;color:var(--text3);}
.sp-tag{display:inline-flex;align-items:center;gap:4px;background:var(--acc-light);color:var(--accent);border-radius:4px;padding:2px 8px;font-size:10px;font-weight:600;}
.sp-tag-x{cursor:pointer;font-size:12px;line-height:1;}
.lrow.highlight{background:#fffbe6;}
.lrow.highlight .lrow-main{color:var(--accent);font-weight:700;}
#print-list{display:none;}
@media print{
  @page{size:A4 landscape;margin:0;}
  body{height:auto;overflow:visible;background:#fff;color:#111;display:block;font-size:10pt;padding:5mm;}
  #up,#app,.mbg,.tip{display:none!important;}
  #print-list{display:block;width:100%;box-sizing:border-box;}
  .print-title{font-size:14pt;font-weight:700;margin:0 0 2mm;}
  .print-sub{font-size:8pt;color:#444;margin:0 0 3mm;}
  .print-table{width:100%;max-width:100%;border-collapse:collapse;font-size:6.6pt;table-layout:fixed;box-sizing:border-box;}
  .print-table th,.print-table td{border:1px solid #999;padding:.8mm .7mm;vertical-align:top;word-break:break-word;overflow-wrap:anywhere;line-height:1.22;box-sizing:border-box;white-space:normal;}
  .print-table th{background:#eee;font-weight:700;text-align:left;}
  .print-table .print-no{width:6mm;text-align:right;}
  .print-table .print-code{width:15mm;}
  .print-table .print-owner{width:13mm;}
  .print-table .print-date{width:16mm;}
  .print-table .print-range{width:23mm;white-space:pre-line;}
  .print-table .print-model{width:26mm;}
  .print-table .print-customer{width:30mm;}
  .print-table .print-detail{font-size:6.2pt;}
  .print-table .print-summary{font-size:6.2pt;}
  .print-table .print-item{font-size:6.1pt;}
  .print-table .print-days{width:12mm;text-align:right;}
  .print-table .print-marker{width:12mm;text-align:center;}
}
</style>

    </div>

      <input type="date" class="sp-input" id="print-end" onchange="activatePrintRange()" style="max-width:140px;">

<script>
// ══════════════════════════════
// STATE
// ══════════════════════════════
let ALL=[], ROWS=[];
let VIEW='month';
let periodStart=null; // 表示期間の開始日（その期間の初日）
let zoomLevel=1;
let baseRowHeight=40;
const APPEARANCE_KEY='gansuke_appearance';
const PRINT_TEMPLATE_KEY='gansuke_print_templates';
const DEFAULT_PRINT_FIELDS=['no','projectNo','customer','owner','ship','due','model','item','orderNo','events'];
const TODAY=new Date(); TODAY.setHours(0,0,0,0);

// ══════════════════════════════
// 期間定義: 「今いる期間」の開始日を決める
// ══════════════════════════════
function getPeriod(v, anchor){
  // anchor: Date（今日 or ナビゲーション後の日付）
  // returns {start: Date, end: Date, label: string}
  const a = anchor || TODAY;
  let s, e, label;
  if(v==='custom'){
    s=customStart?new Date(customStart):new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
    e=customEnd?new Date(customEnd):new Date(TODAY.getFullYear(),TODAY.getMonth()+1,0);
    label=`${fd(s)} 〜 ${fd(e)}`;
    return {start:s,end:e,label};
  }
  if(v==='day'){
    s=new Date(a); e=new Date(a);
    label=`${s.getFullYear()}年${s.getMonth()+1}月${s.getDate()}日（${['日','月','火','水','木','金','土'][s.getDay()]}）`;
  } else if(v==='week'){
    // 月曜始まり
    const dow=a.getDay()===0?7:a.getDay();
    s=addD(a,-(dow-1));
    e=addD(s,6);
    label=`${s.getFullYear()}年${s.getMonth()+1}月${s.getDate()}日 〜 ${e.getMonth()+1}月${e.getDate()}日`;
  } else if(v==='month'){
    s=new Date(a.getFullYear(),a.getMonth(),1);
    e=new Date(a.getFullYear(),a.getMonth()+1,0);
    label=`${s.getFullYear()}年${s.getMonth()+1}月`;
  } else if(v==='2m'){
    s=new Date(a.getFullYear(),a.getMonth(),1);
    e=new Date(a.getFullYear(),a.getMonth()+2,0);
    label=`${s.getFullYear()}年${s.getMonth()+1}月 〜 ${e.getFullYear()}年${e.getMonth()+1}月`;
  } else if(v==='3m'){
    s=new Date(a.getFullYear(),a.getMonth(),1);
    e=new Date(a.getFullYear(),a.getMonth()+3,0);
    label=`${s.getFullYear()}年${s.getMonth()+1}月 〜 ${e.getFullYear()}年${e.getMonth()+1}月`;
  } else if(v==='6m'){
    s=new Date(a.getFullYear(),a.getMonth(),1);
    e=new Date(a.getFullYear(),a.getMonth()+6,0);
    label=`${s.getFullYear()}年${s.getMonth()+1}月 〜 ${e.getFullYear()}年${e.getMonth()+1}月`;
  } else if(v==='1y'){
    s=new Date(a.getFullYear(),0,1);
    e=new Date(a.getFullYear(),11,31);
    label=`${s.getFullYear()}年`;
  } else if(v==='2y'){
    s=new Date(a.getFullYear(),0,1);
    e=new Date(a.getFullYear()+1,11,31);
    label=`${s.getFullYear()}年 〜 ${e.getFullYear()}年`;
  } else { // 3y
    s=new Date(a.getFullYear(),0,1);
    e=new Date(a.getFullYear()+2,11,31);
    label=`${s.getFullYear()}年 〜 ${e.getFullYear()}年`;
  }
  return {start:s, end:e, label};
}

// カスタム期間
let customStart=null, customEnd=null;
function applyCustom(){
  const sv=document.getElementById('custom-s').value;
  const ev=document.getElementById('custom-e').value;
  if(!sv||!ev){alert('開始日と終了日を入力してください');return;}
  const s=new Date(sv), e=new Date(ev);
  if(s>=e){alert('終了日は開始日より後にしてください');return;}
  customStart=s; customEnd=e;
  periodStart=new Date(s);
  renderAll();
}

function stepPeriod(v, anchor, dir){
  // dir: +1 or -1
  const a=anchor;
  if(v==='day')   return addD(a,dir);
  if(v==='week')  return addD(a,dir*7);
  if(v==='month') return new Date(a.getFullYear(),a.getMonth()+dir,1);
  if(v==='2m')    return new Date(a.getFullYear(),a.getMonth()+dir*2,1);
  if(v==='3m')    return new Date(a.getFullYear(),a.getMonth()+dir*3,1);
  if(v==='6m')    return new Date(a.getFullYear(),a.getMonth()+dir*6,1);
  if(v==='1y')    return new Date(a.getFullYear()+dir,0,1);
  if(v==='2y')    return new Date(a.getFullYear()+dir*2,0,1);
  if(v==='custom'&&customStart&&customEnd){
    const span=diffD(customStart,customEnd)+1;
    return addD(a,dir*span);
  }
  return new Date(a.getFullYear()+dir*3,0,1);
}

function showManualPrompt_(){

function setupManualUpload(){

function loadFile(file){

      startApp(e.target.result, file.name);

// ══════════════════════════════
// PARSE
// ══════════════════════════════
function parseG(text){
  text=text.replace(/[\x00-\x08\x0b\x0c\x0e-\x1f\x7f]/g,'');
  text=text.replace(/&(?!amp;|lt;|gt;|quot;|apos;)/g,'&amp;');
  const doc=new DOMParser().parseFromString(text,'text/xml');
  if(doc.querySelector('parsererror'))throw new Error('XMLパースエラー');
  ALL=[];
  doc.querySelectorAll('item').forEach(item=>{
    const txt=(item.querySelector(':scope > text')?.textContent||'').replace(/\n/g,' ').trim();
    const charts=[],events=[];
    item.querySelectorAll('chartlist > chart').forEach(c=>{
      const s=c.querySelector('startdate')?.textContent||'';
      const e=c.querySelector('enddate')?.textContent||'';
      if(!s||!e)return;
      charts.push({label:(c.querySelector('text')?.textContent||'').replace(/\n/g,' ').trim(),
        start:s,end:e,nissuu:c.querySelector('nissuu')?.textContent||'',bikou:c.querySelector('bikou')?.textContent||''});
    });
    item.querySelectorAll('eventlist > event').forEach(ev=>{
      const d=ev.querySelector('eventdate')?.textContent||'';
      if(!d)return;
      events.push({date:d,name:(ev.querySelector('eventname')?.textContent||'').replace(/\n/g,' ').trim(),
        marker:ev.querySelector('marker')?.textContent||'●'});
    });
    ALL.push({item:txt,meta:parseItemMeta(txt),charts,events,sourceIndex:ALL.length});
  });
}

function parseItemMeta(text){
  const src=(text||'').replace(/\s+/g,' ').trim();
  const projectRe=/(?:FK|FS|FX)\d{4}[A-Z]*(?:\([^)]+\))?/gi;
  const projects=[...src.matchAll(projectRe)].map(m=>m[0]);
  const projectNo=projects[0]||'';
  const dueRe=/納期\s*(?:変更\s*)?(\d{4}\/\d{1,2}\/\d{1,2}|\d{1,2}\/\d{1,2}|\d{1,2}\/(?:初旬|中旬|下旬|末|中)|\d{4}\/\d{1,2}\/(?:初旬|中旬|下旬|末|中)|\d{4}\/\d{1,2})/;
  const dueMatch=src.match(dueRe);
  const textDue=dueMatch?.[1]||'';
  const start=projectNo?src.indexOf(projectNo)+projectNo.length:0;
  const model=projectNo&&dueMatch
    ? src.slice(start,dueMatch.index).trim()
    : (projectNo?src.slice(start).trim():'');
  let afterDue=dueMatch?src.slice(dueMatch.index+dueMatch[0].length).trim():'';
  const ownerMatch=afterDue.match(/^(齋木|小川|和久利|鬼頭|山下|山崎|喜多|開原)/);
  const owner=ownerMatch?.[1]||'';
  if(owner)afterDue=afterDue.slice(owner.length).trim();
  afterDue=afterDue.replace(/^[\s　/、,]+/,'');
  const orderMatch=afterDue.match(/\b\d{2}[A-Z]?-\d{3}[A-Z]?\b/);
  const customerBase=orderMatch?afterDue.slice(0,orderMatch.index).trim().replace(/[\s　/、,]+$/,''):afterDue;
  const customer=extractCorporateCustomer(afterDue)||extractCorporateCustomer(customerBase)||customerBase;
  const orderNo=orderMatch?.[0]||'';
  const destination=orderMatch?afterDue.slice(orderMatch.index+orderNo.length).trim().replace(/^[\s　/、,]+/,''):'';
  const confidence=[
    projectNo?'案件番号':'',
    model?'型番':'',
    textDue?'記載納期':'',
    customer?'顧客名':''
  ].filter(Boolean).length;
  return {
    projectNo,
    relatedProjectNos:projects.slice(1),
    model,
    textDue,
    owner,
    customer,
    orderNo,
    destination,
    splitQuality:confidence>=4?'高':confidence>=2?'中':'低'
  };
}

function extractCorporateCustomer(text){
  const src=(text||'').trim();
  if(!src)return '';
  const corporateRe=/(株式会社|有限会社|合同会社|合資会社|合名会社|㈱|㈲|（株）|（有）|\(株\)|\(有\)|株|有限)/;
  const parts=src.split(/[\s　/、,]+/).map(p=>p.trim()).filter(Boolean);
  const idx=parts.map((p,i)=>corporateRe.test(p)?i:-1).filter(i=>i>=0).pop();
  if(idx<0)return '';
  let name=parts[idx];
  const markerOnly=/^(㈱|㈲|（株）|（有）|\(株\)|\(有\)|株|有限|株式会社|有限会社)$/;
  if(markerOnly.test(name)){
    const next=parts[idx+1]||'';
    const prev=parts[idx-1]||'';
    name=(next?name+next:(prev?prev+name:name));
  }
  return name;
}

// ══════════════════════════════
// MARKER LEGEND
// ══════════════════════════════
const MK_KEY='gansuke_markers';
let markerDefs={}; // {symbol: description}

function collectMarkers(){
  // XMLから使われてる全マーカーを収集
  const found=new Set();
  ALL.forEach(r=>r.events.forEach(ev=>{if(ev.marker)found.add(ev.marker);}));
  // 保存済みのラベルをロード
  try{
    const saved=JSON.parse(localStorage.getItem(MK_KEY)||'{}');
    found.forEach(mk=>{if(!(mk in markerDefs))markerDefs[mk]=saved[mk]||'';});
  }catch(e){}
  renderMkPanel();
}

function renderMkPanel(){
  const inner=document.getElementById('mkpanel-inner');
  if(!inner)return;
  inner.innerHTML='';
  // マーカーをソート（よく使われる順: ●▲◎▼○△▽…）
  const order=['●','▲','◎','▼','○','△','▽','◆','■','★'];
  const syms=[...Object.keys(markerDefs)].sort((a,b)=>{
    const ai=order.indexOf(a),bi=order.indexOf(b);
    if(ai>=0&&bi>=0)return ai-bi;
    if(ai>=0)return -1;if(bi>=0)return 1;
    return a.localeCompare(b);
  });
  syms.forEach(mk=>{
    const item=document.createElement('div');
    item.className='mkitem';
    item.innerHTML=`<span class="mkitem-sym">${mk}</span>
      <span class="mksep">=</span>
      <input class="mkinput" data-mk="${mk}" value="${esc(markerDefs[mk]||'')}" placeholder="意味を入力..." maxlength="30">`;
    inner.appendChild(item);
  });
  // 保存ボタン
  const saveDiv=document.createElement('div');
  saveDiv.style.cssText='display:flex;align-items:center;gap:8px;margin-top:2px;';
  saveDiv.innerHTML=`<button class="mk-save" onclick="saveMkDefs()">💾 保存</button>
    <span style="font-size:10px;color:var(--text3)" id="mk-saved-msg"></span>`;
  inner.appendChild(saveDiv);
}

function saveMkDefs(){
  document.querySelectorAll('.mkinput').forEach(inp=>{
    markerDefs[inp.dataset.mk]=inp.value.trim();
  });
  try{localStorage.setItem(MK_KEY,JSON.stringify(markerDefs));}catch(e){}
  const msg=document.getElementById('mk-saved-msg');
  if(msg){msg.textContent='✓ 保存しました';setTimeout(()=>msg.textContent='',2000);}
}

function toggleMkPanel(){
  const p=document.getElementById('mkpanel');

function getMkLabel(mk){
  return markerDefs[mk]?`${mk}：${markerDefs[mk]}`:mk;
}

// ══════════════════════════════
// UTILS
// ══════════════════════════════
function pd(s){if(!s)return null;const[y,m,d]=s.split('/').map(Number);const r=new Date(y,m-1,d);r.setHours(0,0,0,0);return r;}
function fd(d){if(!d)return'';return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function diffD(a,b){return Math.round((b-a)/864e5);}
function isWE(d){return d.getDay()===0||d.getDay()===6;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function bCls(l){if(l.includes('作業'))return'g';if(l.includes('出荷'))return'c';if(l.includes('納品'))return'r';return'b';}

// ══════════════════════════════
// SORT
// ══════════════════════════════
let sortMode='original';
const SORT_ICONS={original:'⇅',due:'納',fk:'FK'};
const SORT_LABELS={original:'元の順番',due:'納期順',fk:'FK番号順'};

function cycleSort(){
  const order=['original','due','fk'];
  sortMode=order[(order.indexOf(sortMode)+1)%order.length];
  const sel=document.getElementById('sort-select');
  if(sel)sel.value=sortMode;
  updateSortUi();
  applyFilterAndSort();
}

function setSortMode(v){
  sortMode=v||'original';
  updateSortUi();
  applyFilterAndSort();
}

function updateSortUi(){
  const icon=document.getElementById('sort-icon');
  const head=document.getElementById('lhead');
  if(icon)icon.textContent=SORT_ICONS[sortMode]||'⇅';
  if(head)head.title=SORT_LABELS[sortMode]||'元の順番';
}

function getSorted(arr){
  if(sortMode==='original')return [...arr].sort((a,b)=>(a.sourceIndex||0)-(b.sourceIndex||0));
  return [...arr].sort((a,b)=>{
    if(sortMode==='due'){
      const ad=getDueDate(a),bd=getDueDate(b);
      if(ad&&bd&&ad.getTime()!==bd.getTime())return ad-bd;
      if(ad&&!bd)return -1;
      if(!ad&&bd)return 1;
    }
    if(sortMode==='fk'){
      const af=getFkNumber(a),bf=getFkNumber(b);
      if(af!==bf)return af-bf;
    }
    return (a.sourceIndex||0)-(b.sourceIndex||0);
  });
}

function rowText(row){
  return [
    row.item,
    row.meta?.projectNo,
    row.meta?.relatedProjectNos?.join(' '),
    row.meta?.model,
    row.meta?.textDue,
    row.meta?.owner,
    row.meta?.customer,
    row.meta?.orderNo,
    row.meta?.destination,
    ...row.charts.flatMap(c=>[c.label,c.start,c.end,c.bikou,c.nissuu]),
    ...row.events.flatMap(ev=>[ev.date,ev.name,ev.marker])
  ].join(' ');
}

function getFkNumber(row){
  const m=rowText(row).match(/FK\s*[-:：]?\s*0*([0-9]+)/i);
  return m?Number(m[1]):Number.MAX_SAFE_INTEGER;
}

function getDueDate(row){
  const priority=row.charts.filter(c=>/納期|納品/.test(c.label));
  const candidates=(priority.length?priority:row.charts).map(c=>pd(c.end)).filter(Boolean);
  if(!candidates.length)return null;
  return candidates.sort((a,b)=>a-b)[0];
}

function getShipmentSpans(row){
  return row.charts
    .filter(c=>/出荷/.test(c.label))
    .map(c=>({start:pd(c.start),end:pd(c.end)}))
    .filter(s=>s.start||s.end);
}

function getWorkSpans(row){
  return row.charts
    .map(c=>({start:pd(c.start),end:pd(c.end)}))
    .filter(s=>s.start||s.end);
}

function spanOverlaps(s,a,b){
  const ss=s.start||s.end,ee=s.end||s.start;
  if(!ss||!ee)return false;
  return ss<=b&&ee>=a;
}

function matchesShipmentMonth(row,monthValue){
  if(!monthValue)return true;
  const [y,m]=monthValue.split('-').map(Number);
  if(!y||!m)return true;
  const a=new Date(y,m-1,1),b=new Date(y,m,0);
  return getShipmentSpans(row).some(s=>spanOverlaps(s,a,b));
}

function matchesShipmentRange(row,startValue,endValue){
  if(!startValue&&!endValue)return true;
  const a=startValue?new Date(startValue):new Date(1900,0,1);
  const b=endValue?new Date(endValue):new Date(2999,11,31);
  a.setHours(0,0,0,0);b.setHours(0,0,0,0);
  return getShipmentSpans(row).some(s=>spanOverlaps(s,a,b));
}

function matchesWorkRange(row,startValue,endValue){
  if(!startValue&&!endValue)return true;
  const a=startValue?new Date(startValue):new Date(1900,0,1);
  const b=endValue?new Date(endValue):new Date(2999,11,31);
  a.setHours(0,0,0,0);b.setHours(0,0,0,0);
  if(a>b)return false;
  return getWorkSpans(row).some(s=>spanOverlaps(s,a,b));
}

function togglePrintPanel(){

    const target=document.getElementById('print-month')?.value

function applyFilterAndSort(){
  const live=document.getElementById('sp-input').value.trim().toLowerCase();
  const allTerms=[...searchTerms.map(t=>t.toLowerCase()),(live?[live]:[])].flat();
  const shipMonth=document.getElementById('ship-month')?.value||'';
  const shipStart=document.getElementById('ship-start')?.value||'';
  const shipEnd=document.getElementById('ship-end')?.value||'';
  const rowLimit=document.getElementById('row-limit')?.value||'all';
  let filtered=ALL.filter(r=>{
    const hay=rowText(r).toLowerCase();
    if(allTerms.length&& !allTerms.every(t=>hay.includes(t)))return false;
    if(shipmentFilterMode==='month'&&!matchesShipmentMonth(r,shipMonth))return false;
    if(shipmentFilterMode==='range'&&!matchesWorkRange(r,shipStart,shipEnd))return false;
    return true;
  });
  const totalAfterFilter=filtered.length;
  filtered=getSorted(filtered);
  if(rowLimit!=='all')filtered=filtered.slice(0,Number(rowLimit)||filtered.length);
  ROWS=filtered;
  focusFilteredRows(ROWS,{allTerms,shipMonth,shipStart,shipEnd});
  updateCount();
  renderAll();
  const el=document.getElementById('sp-count');
  if(el&&ROWS.length<totalAfterFilter)el.textContent+=`（${totalAfterFilter}件中）`;
}

function normalizePeriodStart(d){
  if(!d)return null;
  if(VIEW==='month')return new Date(d.getFullYear(),d.getMonth(),1);
  return new Date(d);
}

function firstSpanDate(spans,rangeStart,rangeEnd){
  const candidates=[];
  spans.forEach(s=>{
    const ss=s.start||s.end,ee=s.end||s.start;
    if(!ss||!ee)return;
    if(rangeStart&&rangeEnd&&!spanOverlaps({start:ss,end:ee},rangeStart,rangeEnd))return;
    candidates.push(rangeStart&&ss<rangeStart?rangeStart:ss);
  });
  return candidates.sort((a,b)=>a-b)[0]||null;
}

function getFocusDateForRow(row,ctx){
  if(shipmentFilterMode==='month'&&ctx.shipMonth){
    const [y,m]=ctx.shipMonth.split('-').map(Number);
    return firstSpanDate(getShipmentSpans(row),new Date(y,m-1,1),new Date(y,m,0));
  }
  if(shipmentFilterMode==='range'&&(ctx.shipStart||ctx.shipEnd)){
    const a=ctx.shipStart?new Date(ctx.shipStart):new Date(1900,0,1);
    const b=ctx.shipEnd?new Date(ctx.shipEnd):new Date(2999,11,31);
    a.setHours(0,0,0,0);b.setHours(0,0,0,0);
    return firstSpanDate(getWorkSpans(row),a,b);
  }
  return firstSpanDate(getWorkSpans(row),null,null);
}

function focusFilteredRows(rows,ctx){
  const hasCondition=(ctx.allTerms&&ctx.allTerms.length>0)||shipmentFilterMode!=='none';
  if(!hasCondition||!rows.length)return;
  const dates=rows.map(r=>getFocusDateForRow(r,ctx)).filter(Boolean).sort((a,b)=>a-b);
  if(!dates.length)return;
  periodStart=normalizePeriodStart(dates[0])||periodStart;
}

function updateCount(){
  const el=document.getElementById('sp-count');
  el.textContent=ROWS.length<ALL.length?`${ROWS.length} / ${ALL.length} 件表示`:`全 ${ALL.length} 件`;
}

function applyZoomVars(){
  const z = zoomLevel;
  const rowH = Math.max(24, Math.min(180, Math.round(baseRowHeight * z)));
  const barH = Math.max(12, Math.min(rowH - 8, Math.round(22 * z)));
  const barTop = Math.max(2, Math.round((rowH - barH) / 2));
  const eventFont = Math.max(10, Math.min(rowH - 6, Math.round(15 * z)));
  const eventTop = Math.max(1, Math.round((rowH - eventFont) / 2));
  const dayFont = Math.max(10, Math.round(12 * z));
  const monthFont = Math.max(dayFont + 2, Math.round(15 * z));
  const dhTopH = Math.max(24, Math.round(32 * z));
  const dhBotH = Math.max(26, Math.round(34 * z));
  document.documentElement.style.setProperty('--row-h', rowH + 'px');
  document.documentElement.style.setProperty('--dh-top-h', dhTopH + 'px');
  document.documentElement.style.setProperty('--dh-bot-h', dhBotH + 'px');
  document.documentElement.style.setProperty('--dh-h', (dhTopH + dhBotH) + 'px');
  document.documentElement.style.setProperty('--dh-font', dayFont + 'px');
  document.documentElement.style.setProperty('--dh-month-font', monthFont + 'px');
  document.documentElement.style.setProperty('--ui-font', Math.max(11, Math.round(12 * z)) + 'px');
  document.documentElement.style.setProperty('--ui-small-font', Math.max(10, Math.round(11 * z)) + 'px');
  document.documentElement.style.setProperty('--bar-h', barH + 'px');
  document.documentElement.style.setProperty('--bar-top', barTop + 'px');
  document.documentElement.style.setProperty('--bar-font', dayFont + 'px');
  document.documentElement.style.setProperty('--event-top', eventTop + 'px');
  document.documentElement.style.setProperty('--event-font', eventFont + 'px');
  document.documentElement.style.setProperty('--lrow-main-font', Math.max(9, Math.round(11 * z)) + 'px');
  document.documentElement.style.setProperty('--lrow-sub-font', Math.max(8, Math.round(9 * z)) + 'px');
}

function periodLabelHtml(period){
  const s=period.start,e=period.end;
  if(!s||!e)return esc(period.label||'');
  if(VIEW==='month'){
    return `<span class="period-year">${s.getFullYear()}年</span><span class="period-month">${s.getMonth()+1}月</span>`;
  }
  if(VIEW==='day'){
    return `<span class="period-year">${s.getFullYear()}年</span><span class="period-month">${s.getMonth()+1}月</span><span class="period-extra">${s.getDate()}日（${['日','月','火','水','木','金','土'][s.getDay()]}）</span>`;
  }
  if(VIEW==='week'){
    const sameYear=s.getFullYear()===e.getFullYear();
    const endText=sameYear?`${e.getMonth()+1}月${e.getDate()}日`:`${e.getFullYear()}年${e.getMonth()+1}月${e.getDate()}日`;
    return `<span class="period-year">${s.getFullYear()}年</span><span class="period-month">${s.getMonth()+1}月</span><span class="period-extra">${s.getDate()}日 〜 ${endText}</span>`;
  }
  return esc(period.label||'');
}

// ══════════════════════════════
// TIMELINE
// ══════════════════════════════
function renderTimeline(){
  const period=getPeriod(VIEW,periodStart);
  const focusS=period.start, focusE=period.end;
  const focusDays=diffD(focusS,addD(focusE,1));

  // update label
  document.getElementById('period-label').innerHTML=periodLabelHtml(period);

  // ── pxPerDayはフォーカス期間の幅で決める（スケール固定） ──
  const availW=document.getElementById('tlsc').clientWidth||800;
  const pxPerDay=Math.max(1.5, (availW/focusDays) * zoomLevel);

  // ── 描画範囲: 前後に同スケールで拡張（スクロール用） ──
  // フォーカス期間の2倍分を前後に追加
  const S=addD(focusS,-focusDays*2);
  const E=addD(focusE,focusDays*2);
  const totalDays=diffD(S,addD(E,1));

  const totalW=pxPerDay*totalDays;

  // day columns
  const days=[];
  for(let d=new Date(S);d<=E;d=addD(d,1)){
    const diff=diffD(S,d);
    days.push({d:new Date(d),x:diff*pxPerDay,w:pxPerDay,we:isWE(d),isToday:d.getTime()===TODAY.getTime()});
  }

  // ── TOP HEADER: 月 ──
  const dht=document.getElementById('dht');
  dht.innerHTML='';
  dht.style.width=totalW+'px';
  const mgroups=[];
  days.forEach(col=>{
    const key=`${col.d.getFullYear()}-${col.d.getMonth()}`;
    if(!mgroups.length||mgroups[mgroups.length-1].key!==key)
      mgroups.push({key,x:col.x,w:col.w,year:col.d.getFullYear(),month:col.d.getMonth()+1});
    else mgroups[mgroups.length-1].w+=col.w;
  });
  mgroups.forEach(mg=>{
    const c=document.createElement('div');
    c.className='dhc mth';
    c.style.width=mg.w+'px';c.style.minWidth=mg.w+'px';
    c.innerHTML=`<span class="dh-year">${mg.year}年</span><span class="dh-month">${mg.month}月</span>`;
    dht.appendChild(c);
  });

  // ── BOTTOM HEADER: 日付 or 週 ──
  const dhb=document.getElementById('dhb');
  dhb.innerHTML='';
  dhb.style.width=totalW+'px';

  if(VIEW==='week'||VIEW==='day'){
    // 日付＋曜日
    const DAYS=['日','月','火','水','木','金','土'];
    days.forEach(col=>{
      const c=document.createElement('div');
      c.className='dhc'+(col.we?' we':'')+(col.isToday?' td':'');
      c.style.width=col.w+'px';c.style.minWidth=col.w+'px';
      c.textContent=`${col.d.getDate()}(${DAYS[col.d.getDay()]})`;
      dhb.appendChild(c);
    });
  } else if(['month','2m','3m'].includes(VIEW)){
    // 日付（1日だけ月名は上段に出てる）
    days.forEach(col=>{
      const c=document.createElement('div');
      c.className='dhc'+(col.we?' we':'')+(col.isToday?' td':'');
      c.style.width=col.w+'px';c.style.minWidth=col.w+'px';
      if(pxPerDay>=10)c.textContent=col.d.getDate();
      else if(col.d.getDate()===1||col.d.getDate()===15)c.textContent=col.d.getDate();
      dhb.appendChild(c);
    });
  } else {
    // 6m/1y/2y/3y: 週番号 or 月初だけ
    days.forEach(col=>{
      const c=document.createElement('div');
      c.className='dhc'+(col.we?' we':'')+(col.isToday?' td':'');
      c.style.width=col.w+'px';c.style.minWidth=col.w+'px';
      if(col.d.getDate()===1)c.textContent=col.d.getDate()+'日';
      dhb.appendChild(c);
    });
  }

  // ── TL ROWS ──
  const tlrows=document.getElementById('tlrows');
  tlrows.innerHTML='';
  document.getElementById('tlin').style.minWidth=totalW+'px';

  // helper: date → x
  const dx=d=>{
    if(!d)return null;
    const diff=diffD(S,d);
    return diff*pxPerDay;
  };

  ROWS.forEach((row,ri)=>{
    const div=document.createElement('div');
    div.className='trow'+(ri%2===1?' alt':'');
    div.style.width=totalW+'px';

    // weekend bg + today bg
    days.forEach(col=>{
      if(col.we){
        const bg=document.createElement('div');
        bg.className='calbg we';bg.style.left=col.x+'px';bg.style.width=col.w+'px';
        div.appendChild(bg);
      }
      if(col.isToday){
        const bg=document.createElement('div');
        bg.className='calbg td-bg';bg.style.left=col.x+'px';bg.style.width=col.w+'px';
        div.appendChild(bg);
      }
    });

    // vertical lines
    days.forEach(col=>{
      const show=VIEW==='day'||VIEW==='week'
        ||(pxPerDay>=10&&true)
        ||(pxPerDay>=4&&col.d.getDate()%5===1)
        ||(pxPerDay<4&&col.d.getDate()===1);
      if(show){
        const vl=document.createElement('div');
        vl.className='vl'+(col.isToday?' td-vl':'');
        vl.style.left=col.x+'px';
        div.appendChild(vl);
      }
    });

    // today line (if not already in days range, still draw)
    if(TODAY>=S&&TODAY<=E){
      const tx=dx(TODAY);
      if(tx!==null){
        const tl=document.createElement('div');
        tl.className='vl td-vl';tl.style.left=tx+'px';
        div.appendChild(tl);
      }
    }

    // bars
    row.charts.forEach(c=>{
      const cs=pd(c.start),ce=pd(c.end);
      if(!cs||!ce)return;
      // クランプして期間内だけ表示
      const bs=cs<S?S:cs, be=ce>E?E:ce;
      if(bs>E||be<S)return;
      const bx=dx(bs);
      const bw=diffD(bs,addD(be,1))*pxPerDay;
      if(bw<=0)return;
      const bar=document.createElement('div');
      bar.className='gbar '+bCls(c.label);
      bar.style.left=Math.max(0,bx)+'px';
      bar.style.width=Math.max(3,bw)+'px';
      if(pxPerDay>=8)bar.textContent=c.label;
      bar.addEventListener('click',()=>openM(ri));
      bar.addEventListener('mouseenter',ev=>showTip(ev,`<b>${esc(c.label)}</b><br>${fd(cs)} 〜 ${fd(ce)}`));
      bar.addEventListener('mouseleave',hideTip);
      div.appendChild(bar);
    });

    // events
    row.events.forEach(ev=>{
      const d=pd(ev.date);
      if(!d||d<S||d>E)return;
      const ex=dx(d);
      if(ex===null)return;
      const el=document.createElement('div');
      el.className='gev';el.style.left=ex+'px';
      el.textContent=ev.marker||'●';
      el.addEventListener('click',()=>openM(ri));
      el.addEventListener('mouseenter',e2=>showTip(e2,`<b>${esc(getMkLabel(ev.marker))}</b><br>${esc(fd(d))}<br>${esc(ev.name)}`));
      el.addEventListener('mouseleave',hideTip);
      div.appendChild(el);
    });

    tlrows.appendChild(div);
  });

  syncScroll();

  // フォーカス期間の先頭にスクロール位置を合わせる
  requestAnimationFrame(()=>{
    const sc=document.getElementById('tlsc');
    const focusX=diffD(S,focusS)*pxPerDay;
    sc.scrollLeft=Math.max(0,focusX-12);
  });
}

function openM(idx){
  const row=ROWS[idx];
  document.getElementById('mtitle').textContent=row.item;
  let html='';
  if(row.charts.length){
    html+=`<div class="msec"><div class="msec-title">📊 チャート（${row.charts.length}件）</div>
    <table class="mtbl"><thead><tr><th>種別</th><th>開始日</th><th>終了日</th><th>日数</th><th>備考</th></tr></thead><tbody>`;
    row.charts.forEach(c=>{
      html+=`<tr><td><span class="mbadge ${bCls(c.label)}">${esc(c.label)}</span></td>
      <td>${esc(c.start)}</td><td>${esc(c.end)}</td>
      <td style="text-align:right;font-variant-numeric:tabular-nums">${c.nissuu}</td>
      <td style="color:var(--text2)">${esc(c.bikou)}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  if(row.events.length){
    const sorted=[...row.events].sort((a,b)=>pd(a.date)-pd(b.date));
    html+=`<div class="msec"><div class="msec-title">📍 イベント（${sorted.length}件）</div>
    <table class="mtbl"><thead><tr><th>日付</th><th>マーカー</th><th>内容</th></tr></thead><tbody>`;
    sorted.forEach(ev=>{
      const d=pd(ev.date);const past=d&&d<TODAY;
      const mkLabel=markerDefs[ev.marker]?`<span style="font-size:10px;color:var(--text3);margin-left:4px">${esc(markerDefs[ev.marker])}</span>`:'';
      html+=`<tr class="${past?'past-row':''}"><td style="white-space:nowrap">${esc(ev.date)}</td>
      <td style="text-align:center;font-size:15px">${ev.marker}${mkLabel}</td>
      <td>${esc(ev.name)}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  if(!html)html=`<p style="color:var(--text3);padding:16px 0">データがありません</p>`;
  document.getElementById('mbody').innerHTML=html;
  document.getElementById('mbg').classList.add('open');
}

function showAppearanceMessage(text){
  let el=document.getElementById('appearance-msg');
  if(!el){
    el=document.createElement('div');
    el.id='appearance-msg';
    el.style.cssText='position:fixed;right:16px;bottom:16px;background:#1a2035;color:#fff;padding:8px 12px;border-radius:8px;font-size:12px;z-index:200;box-shadow:0 4px 18px rgba(0,0,0,.18);';
    document.body.appendChild(el);
  }
  el.textContent=text;
  el.style.display='block';
  clearTimeout(showAppearanceMessage._timer);
  showAppearanceMessage._timer=setTimeout(()=>{el.style.display='none';},1800);
}

function saveAppearance(){
  const payload={zoomLevel,baseRowHeight,labelWidth:currentLabelWidth()};
  try{
    localStorage.setItem(APPEARANCE_KEY,JSON.stringify(payload));
    showAppearanceMessage('見た目を保存しました');
  }catch(e){
    showAppearanceMessage('保存できませんでした');
  }
}

function resetAppearance(){
  zoomLevel=1;
  baseRowHeight=40;
  setLabelWidth(290);
  try{localStorage.removeItem(APPEARANCE_KEY);}catch(e){}
  applyZoomVars();
  renderAll();
  showAppearanceMessage('見た目を標準に戻しました');
}

// ══════════════════════════════
// PRINT DUE LIST
// ══════════════════════════════
function getSelectedPrintRange(){
  const month=document.getElementById('print-month')?.value||'';
  const sv=document.getElementById('print-start')?.value||'';
  const ev=document.getElementById('print-end')?.value||'';
  if(printRangeMode==='range'&&(sv||ev)){
    const start=sv?new Date(sv):new Date(1900,0,1);
    const end=ev?new Date(ev):new Date(2999,11,31);
    start.setHours(0,0,0,0);end.setHours(0,0,0,0);
    if(start>end)return {error:'開始日は終了日以前にしてください'};
    return {start,end,label:`${sv||'指定なし'} 〜 ${ev||'指定なし'}`,mode:'range'};
  }
  if(printRangeMode==='month'&&month){
    const [y,m]=month.split('-').map(Number);
    return {start:new Date(y,m-1,1),end:new Date(y,m,0),label:`${y}年${m}月`,mode:'month'};
  }
  return null;
}

function dateInRange(d,start,end){
  return d&&d>=start&&d<=end;
}

function parseRangeTextDate(token,range){
  if(!token||!range)return null;
  const s=String(token);
  let m=s.match(/(\d{4})[\/.-](\d{1,2})(?:[\/.-](\d{1,2}))?/);
  if(m){
    const y=Number(m[1]),mo=Number(m[2]),da=Number(m[3]||1);
    const d=new Date(y,mo-1,da);d.setHours(0,0,0,0);
    return d;
  }
  m=s.match(/(?:^|[^\d])(\d{1,2})[\/月](\d{1,2}|初旬|中旬|下旬|末|中)(?:日)?/);
  if(m){
    const mo=Number(m[1]);
    const rawDay=m[2];
    const da=/^\d+$/.test(rawDay)?Number(rawDay):rawDay==='末'?28:rawDay==='下旬'?21:rawDay==='中旬'||rawDay==='中'?15:1;
    const years=[range.start.getFullYear(),range.end.getFullYear()];
    for(const y of [...new Set(years)]){
      const d=new Date(y,mo-1,da);d.setHours(0,0,0,0);
      if(d>=new Date(y,range.start.getMonth(),1)&&d<=new Date(y,range.end.getMonth()+1,0))return d;
    }
    const d=new Date(range.start.getFullYear(),mo-1,da);d.setHours(0,0,0,0);
    return d;
  }
  m=s.match(/(?:^|[^\d])(\d{1,2})月/);
  if(m){
    const mo=Number(m[1]);
    const d=new Date(range.start.getFullYear(),mo-1,1);d.setHours(0,0,0,0);
    return d;
  }
  return null;
}

function tokenHasOutOfRangeDate(token,range){
  const d=parseRangeTextDate(token,range);
  return !!(d&& !dateInRange(d,range.start,range.end));
}

function getRangeItemText(row,range){
  const text=row.item||'';
  if(!range)return text;
  const parts=text.split(/(\s+)/);
  const kept=[];
  for(let i=0;i<parts.length;i++){
    const part=parts[i];
    if(!part.trim()){
      kept.push(part);
      continue;
    }
    if(tokenHasOutOfRangeDate(part,range)){
      continue;
    }
    kept.push(part);
  }
  return kept.join('').replace(/\s{2,}/g,' ').trim();
}

function rowMatchesPrintRange(row,range){
  const due=getDueDate(row);
  if(dateInRange(due,range.start,range.end))return true;
  if(range.mode==='range')return getWorkSpans(row).some(s=>spanOverlaps(s,range.start,range.end));
  return getShipmentSpans(row).some(s=>spanOverlaps(s,range.start,range.end));
}

function clampSpanToRange(span,range){
  if(!range)return span;
  const start=span.start&&span.start<range.start?range.start:span.start;
  const end=span.end&&span.end>range.end?range.end:span.end;
  return {...span,start,end};
}

function getShipmentText(row,range){
  const spans=getShipmentSpans(row)
    .filter(s=>!range||spanOverlaps(s,range.start,range.end))
    .map(s=>clampSpanToRange(s,range));
  if(!spans.length)return '';
  return spans.map(s=>`${fd(s.start||s.end)}〜${fd(s.end||s.start)}`).join('\n');
}

function getRangeCharts(row,range){
  if(!range)return row.charts;
  return row.charts.filter(c=>{
    const s=pd(c.start),e=pd(c.end);
    return s&&e&&spanOverlaps({start:s,end:e},range.start,range.end);
  });
}

function getRangeEvents(row,range){
  if(!range)return row.events;
  return row.events.filter(ev=>dateInRange(pd(ev.date),range.start,range.end));
}

function chartDateText(c,range){
  if(!range)return `${c.start}〜${c.end}`;
  const s=pd(c.start),e=pd(c.end);
  if(!s||!e)return `${c.start}〜${c.end}`;
  const clipped=clampSpanToRange({start:s,end:e},range);
  return `${fd(clipped.start)}〜${fd(clipped.end)}`;
}

function getChartSummary(row,range){
  return getRangeCharts(row,range).slice(0,3).map(c=>`${c.label} ${chartDateText(c,range)}`).join(' / ');
}

function getPrintTemplates(){
  try{return JSON.parse(localStorage.getItem(PRINT_TEMPLATE_KEY)||'{}');}
  catch(e){return {};}
}

function setPrintFields(fields){
  document.querySelectorAll('.print-field').forEach(cb=>{
    cb.checked=fields.includes(cb.value);
  });
}

function getPrintFields(){
  const fields=[...document.querySelectorAll('.print-field:checked')].map(cb=>cb.value);
  return fields.length?fields:[...DEFAULT_PRINT_FIELDS];
}

function renderPrintTemplateSelect(selected='標準'){
  const sel=document.getElementById('print-template-select');
  if(!sel)return;
  const templates=getPrintTemplates();
  sel.innerHTML='<option value="標準">標準</option>';
  Object.keys(templates).sort((a,b)=>a.localeCompare(b,'ja')).forEach(name=>{
    const opt=document.createElement('option');
    opt.value=name;opt.textContent=name;
    sel.appendChild(opt);
  });
  sel.value=(selected==='標準'||Array.isArray(templates[selected]))?selected:'標準';
}

function initPrintTemplates(){
  setPrintFields(DEFAULT_PRINT_FIELDS);
  renderPrintTemplateSelect('標準');
}

function loadPrintTemplate(name){
  if(!name||name==='標準'){
    setPrintFields(DEFAULT_PRINT_FIELDS);
    return;
  }
  const templates=getPrintTemplates();
  if(Array.isArray(templates[name]))setPrintFields(templates[name]);
}

function savePrintTemplate(){
  const name=prompt('保存する出力テンプレート名を入力してください');
  if(!name)return;
  const clean=name.trim();
  if(!clean)return;
  const templates=getPrintTemplates();
  templates[clean]=getPrintFields();
  try{
    localStorage.setItem(PRINT_TEMPLATE_KEY,JSON.stringify(templates));
    renderPrintTemplateSelect(clean);
    showAppearanceMessage('出力テンプレートを保存しました');
  }catch(e){
    showAppearanceMessage('保存できませんでした');
  }
}

function deletePrintTemplate(){
  const sel=document.getElementById('print-template-select');
  const name=sel?.value;
  if(!name||name==='標準')return;
  const templates=getPrintTemplates();
  delete templates[name];
  try{localStorage.setItem(PRINT_TEMPLATE_KEY,JSON.stringify(templates));}catch(e){}
  setPrintFields(DEFAULT_PRINT_FIELDS);
  renderPrintTemplateSelect('標準');
  showAppearanceMessage('出力テンプレートを削除しました');
}

const PRINT_FIELD_DEFS={
  no:{label:'No.',cls:'print-no',value:(row,i)=>String(i+1)},
  item:{label:'基本データ',cls:'print-item',value:(row,i,range)=>getRangeItemText(row,range)||'-'},
  projectNo:{label:'案件番号',cls:'print-code',value:row=>row.meta?.projectNo||'-'},
  model:{label:'型番',cls:'print-model',value:row=>row.meta?.model||'-'},
  customer:{label:'顧客名',cls:'print-customer',value:row=>row.meta?.customer||'-'},
  textDue:{label:'記載納期',cls:'print-date',value:(row,i,range)=>{
    const text=row.meta?.textDue||'';
    if(!range||!text)return text||'-';
    const d=parseRangeTextDate(text,range);
    return !d||dateInRange(d,range.start,range.end)?text:'-';
  }},
  orderNo:{label:'見積番号',cls:'print-code',value:row=>row.meta?.orderNo||'-'},
  owner:{label:'技術担当',cls:'print-owner',value:row=>row.meta?.owner||'-'},
  due:{label:'納期',cls:'print-date',value:(row,i,range)=>{
    const due=getDueDate(row);
    if(range&&!dateInRange(due,range.start,range.end))return '-';
    return fd(due)||'-';
  }},
  ship:{label:'出荷日',cls:'print-range',value:(row,i,range)=>getShipmentText(row,range)||'-'},
  summary:{label:'予定概要',cls:'print-summary',value:(row,i,range)=>getChartSummary(row,range)||'-'},
  charts:{label:'チャート明細',cls:'print-detail',value:(row,i,range)=>getRangeCharts(row,range).map(c=>`${c.label} ${chartDateText(c,range)}${c.nissuu?` (${c.nissuu}日)`:''}${c.bikou?` ${c.bikou}`:''}`).join(' / ')||'-'},
  events:{label:'イベント',cls:'print-detail',value:(row,i,range)=>getRangeEvents(row,range).map(ev=>`${ev.date} ${ev.marker||''} ${ev.name}`).join(' / ')||'-'}
};

function printDueList(){
  const range=getSelectedPrintRange();
  if(range?.error){
    showAppearanceMessage(range.error);
    return;
  }
  if(!range){
    showAppearanceMessage('出力期間を指定してください');
    const p=document.getElementById('print-panel');
    if(p&&!p.classList.contains('open'))p.classList.add('open');
    document.getElementById('print-start')?.focus();
    return;
  }
  const rows=ALL.filter(row=>{
    if(!rowMatchesPrintRange(row,range))return false;
    return true;
  }).sort((a,b)=>{
    const ad=getDueDate(a),bd=getDueDate(b);
    if(ad&&bd&&ad.getTime()!==bd.getTime())return ad-bd;
    if(ad&&!bd)return -1;
    if(!ad&&bd)return 1;
    return (a.sourceIndex||0)-(b.sourceIndex||0);
  });
  const now=new Date();
  const fields=getPrintFields().filter(f=>PRINT_FIELD_DEFS[f]);
  const head=fields.map(f=>`<th class="${PRINT_FIELD_DEFS[f].cls}">${esc(PRINT_FIELD_DEFS[f].label)}</th>`).join('');
  const body=rows.map((row,i)=>`<tr>${fields.map(f=>{
    const def=PRINT_FIELD_DEFS[f];
    return `<td class="${def.cls}">${esc(def.value(row,i,range))}</td>`;
  }).join('')}</tr>`).join('');
  document.getElementById('print-list').innerHTML=`
    <div class="print-title">範囲指定案件リスト（納期順）</div>
    <div class="print-sub">対象期間：${esc(range.label)}　件数：${rows.length}件　出力：${fd(now)}</div>
    <table class="print-table">
      <thead><tr>${head}</tr></thead>
      <tbody>${body||`<tr><td colspan="${fields.length}">該当案件はありません</td></tr>`}</tbody>
    </table>`;
  window.print();
}

// ══════════════════════════════
// RESIZE
// ══════════════════════════════
let labelResizeReady=false;
function initColumnResize(){
  if(labelResizeReady)return;
  const handle=document.getElementById('lresize');
  if(!handle)return;
  labelResizeReady=true;
  let startX=0,startW=0,dragging=false;
  handle.addEventListener('mousedown',e=>{
    dragging=true;
    startX=e.clientX;
    startW=document.querySelector('.lcol')?.getBoundingClientRect().width||290;
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging)return;
    setLabelWidth(startW+(e.clientX-startX));
    renderTimeline();
  });
  window.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;
    document.body.style.cursor='';
    document.body.style.userSelect='';
  });
}

let rowResizeReady=false;
function initRowResize(){
  if(rowResizeReady)return;
  const body=document.getElementById('lbody');
  if(!body)return;
  rowResizeReady=true;
  let startY=0,startBase=0,dragging=false;
  body.addEventListener('mousedown',e=>{
    const handle=e.target.closest('.row-resize');
    if(!handle)return;
    dragging=true;
    startY=e.clientY;
    startBase=baseRowHeight;
    document.body.style.cursor='row-resize';
    document.body.style.userSelect='none';
    e.preventDefault();
    e.stopPropagation();
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging)return;
    baseRowHeight=Math.max(24,Math.min(180,Math.round(startBase+(e.clientY-startY)/zoomLevel)));
    applyZoomVars();
    renderTimeline();
  });
  window.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;
    document.body.style.cursor='';
    document.body.style.userSelect='';
  });
}
window.addEventListener('resize',()=>renderTimeline());
</script>
