<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>製造課 スケジュールビューア（2026/06/13 02:16更新）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f2f5;--white:#fff;--border:#dde1ea;--border2:#b8c0d0;
  --text:#1a2035;--text2:#4a5270;--text3:#9098b0;
  --accent:#1d4ed8;--acc-light:#eff3ff;
  --today:#dc2626;
  --green:#15803d;--green-bg:#dcfce7;
  --cyan:#0e7490;--cyan-bg:#cffafe;
  --red:#b91c1c;--red-bg:#fee2e2;
  --blue:#1d4ed8;--blue-bg:#dbeafe;
  --row-h:40px;--label-w:290px;--dh-h:52px;
  --sans:'Noto Sans JP',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:12px;}

/* ── UPLOAD ── */
#up{display:flex;align-items:center;justify-content:center;height:100vh;}
.up-card{background:var(--white);border-radius:16px;padding:48px 52px;text-align:center;width:420px;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.dz{border:2px dashed var(--border2);border-radius:10px;padding:32px;cursor:pointer;transition:.2s;background:var(--bg);margin-bottom:18px;}
.dz:hover,.dz.drag{border-color:var(--accent);background:var(--acc-light);}
.up-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px 0;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);width:100%;}
.up-btn:hover{background:#1840b0;}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden;}

/* TOPBAR */
.bar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.bar-title{font-size:13px;font-weight:700;}
.bar-file{font-size:10px;color:var(--text3);padding:2px 7px;background:var(--bg);border-radius:4px;}
.vbtns{display:flex;border:1.5px solid var(--border2);border-radius:8px;overflow:hidden;}
.vb{padding:6px 13px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);background:var(--white);border:none;border-right:1px solid var(--border);font-family:var(--sans);transition:.12s;white-space:nowrap;}
.vb:last-child{border-right:none;}
.vb.on{background:var(--accent);color:#fff;font-weight:700;}
.vb:hover:not(.on){background:var(--acc-light);}
.nav-btn{background:var(--white);border:1.5px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:13px;cursor:pointer;color:var(--text2);}
.nav-btn:hover{background:var(--bg);}
.period-label{font-size:12px;font-weight:600;color:var(--text);min-width:160px;text-align:center;}
.today-btn{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);}
.today-btn:hover{background:#1840b0;}
.srch{display:flex;align-items:center;gap:5px;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:4px 9px;}
.srch input{border:none;background:transparent;font-size:11px;color:var(--text);outline:none;width:160px;font-family:var(--sans);}
.reset-btn{background:none;border:1.5px solid var(--border);border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;color:var(--text2);font-family:var(--sans);}

/* LEGEND */
.legend{display:flex;align-items:center;gap:14px;padding:4px 14px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);}
.leg-box{height:10px;width:24px;border-radius:3px;}
.leg-line{width:2px;height:14px;background:var(--today);}
.leg-note{margin-left:auto;font-size:10px;color:var(--text3);}

/* GANTT SHELL */
.shell{display:flex;flex:1;overflow:hidden;}

/* LEFT */
.lcol{width:var(--label-w);min-width:var(--label-w);flex-shrink:0;border-right:2px solid var(--border2);background:var(--white);display:flex;flex-direction:column;z-index:10;}
.lhead{height:var(--dh-h);display:flex;align-items:center;padding:0 12px;background:var(--bg);border-bottom:1.5px solid var(--border2);font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;}
.lbody{flex:1;overflow:hidden;}
.lrow{height:var(--row-h);display:flex;flex-direction:column;justify-content:center;padding:0 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.lrow:hover{background:var(--acc-light);}
.lrow-main{font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:266px;}
.lrow-sub{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:266px;margin-top:1px;}

/* RIGHT */
.rcol{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.tl-sc{flex:1;overflow:auto;}
.tl-in{display:inline-flex;flex-direction:column;min-width:100%;position:relative;}

/* DATE HEADER */
.dh{position:sticky;top:0;z-index:15;background:var(--white);border-bottom:2px solid var(--border2);}
.dh-top{display:flex;height:24px;border-bottom:1px solid var(--border);}
.dh-bot{display:flex;height:28px;}
.dhc{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text2);border-right:1px solid var(--border);flex-shrink:0;overflow:hidden;white-space:nowrap;}
.dhc.mth{background:var(--bg);font-size:11px;font-weight:700;color:var(--text);}
.dhc.we{background:#fef9ef;color:#b45309;}
.dhc.td{background:#fef2f2;color:var(--today);font-weight:800;}

/* TL ROWS */
.trow{height:var(--row-h);position:relative;border-bottom:1px solid var(--border);flex-shrink:0;}
.trow.alt{background:#fafbfc;}
.trow:hover{background:#f0f4ff;}
.calbg{position:absolute;top:0;bottom:0;pointer-events:none;}
.calbg.we{background:rgba(251,191,36,.08);}
.calbg.td-bg{background:rgba(220,38,38,.07);}
.vl{position:absolute;top:0;bottom:0;width:1px;background:var(--border);pointer-events:none;}
.vl.td-vl{background:var(--today);width:2px;z-index:4;opacity:.85;}
.gbar{position:absolute;height:22px;top:9px;border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:10px;font-weight:700;color:#fff;cursor:pointer;z-index:3;overflow:hidden;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.18);transition:filter .1s;}
.gbar:hover{filter:brightness(.88);}
.gbar.g{background:var(--green);}
.gbar.c{background:var(--cyan);}
.gbar.r{background:var(--red);}
.gbar.b{background:var(--blue);}
.gev{position:absolute;top:3px;font-size:15px;cursor:pointer;z-index:5;transform:translateX(-50%);transition:transform .1s;line-height:1;}
.gev:hover{transform:translateX(-50%) scale(1.2);}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:50;align-items:center;justify-content:center;}
.mbg.open{display:flex;}
.mcard{background:var(--white);border-radius:14px;padding:28px;width:660px;max-width:94vw;max-height:84vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.18);}
.mtitle{font-size:14px;font-weight:700;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid var(--border);line-height:1.6;}
.msec{margin-bottom:18px;}
.msec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px;}
.mtbl{width:100%;border-collapse:collapse;font-size:12px;}
.mtbl th{background:var(--bg);padding:7px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--text2);border:1px solid var(--border);}
.mtbl td{padding:7px 10px;border:1px solid var(--border);color:var(--text);vertical-align:top;}
.mtbl tr:nth-child(even) td{background:#fafbfc;}
.mbadge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;}
.mbadge.g{background:var(--green-bg);color:#166534;}
.mbadge.c{background:var(--cyan-bg);color:#155e75;}
.mbadge.r{background:var(--red-bg);color:#991b1b;}
.mbadge.b{background:var(--blue-bg);color:#1e40af;}
.mclose{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 24px;font-size:12px;cursor:pointer;font-family:var(--sans);font-weight:500;color:var(--text2);}
.mclose:hover{background:var(--border);}
.past-row{opacity:.45;}

/* TOOLTIP */
.tip{position:fixed;background:rgba(22,28,46,.93);color:#fff;border-radius:7px;padding:8px 12px;font-size:11px;max-width:260px;z-index:100;pointer-events:none;display:none;line-height:1.8;}
.tip b{color:#93c5fd;}
/* marker legend */
.mkpanel{background:var(--white);border-bottom:2px solid var(--border);padding:0;max-height:0;overflow:hidden;transition:max-height .25s ease,padding .25s ease;flex-shrink:0;}
.mkpanel.open{max-height:200px;padding:10px 14px;}
.mkpanel-inner{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start;}
.mkitem{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:5px 10px;min-width:180px;}
.mkitem-sym{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
.mksep{font-size:11px;color:var(--text3);}
.mkinput{border:none;background:transparent;font-size:11px;color:var(--text);outline:none;font-family:var(--sans);flex:1;min-width:80px;}
.mkinput::placeholder{color:var(--text3);}
.mk-toggle{background:none;border:1.5px solid var(--border);border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;color:var(--text2);font-family:var(--sans);white-space:nowrap;}
.mk-toggle:hover{background:var(--bg);}
.mk-save{background:var(--green);color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:10px;font-weight:600;cursor:pointer;font-family:var(--sans);}
.mk-save:hover{background:#166534;}
/* sort */
.lhead{cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between;}
.lhead:hover{background:var(--acc-light);}
.sort-icon{font-size:11px;color:var(--text3);margin-left:4px;}
/* search panel */
.spanel{background:var(--white);border-bottom:1px solid var(--border);padding:6px 10px;display:none;flex-direction:column;gap:6px;flex-shrink:0;}
.spanel.open{display:flex;}
.spanel-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.sp-label{font-size:10px;color:var(--text3);white-space:nowrap;}
.sp-input{flex:1;min-width:160px;border:1.5px solid var(--border2);border-radius:6px;padding:5px 8px;font-size:12px;font-family:var(--sans);color:var(--text);outline:none;}
.sp-input:focus{border-color:var(--accent);}
.sp-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 14px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);white-space:nowrap;}
.sp-btn.clear{background:var(--bg);color:var(--text2);border:1.5px solid var(--border);}
.sp-btn.clear:hover{background:var(--border);}
.sp-count{font-size:10px;color:var(--text3);}
.sp-tag{display:inline-flex;align-items:center;gap:4px;background:var(--acc-light);color:var(--accent);border-radius:4px;padding:2px 8px;font-size:10px;font-weight:600;}
.sp-tag-x{cursor:pointer;font-size:12px;line-height:1;}
.lrow.highlight{background:#fffbe6;}
.lrow.highlight .lrow-main{color:var(--accent);font-weight:700;}
</style>
</head>
<body>

<!-- UPLOAD -->
<div id="up">
  <div class="up-card">
    <div style="font-size:46px;margin-bottom:16px" id="up-icon">📂</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:8px" id="up-title">XMLファイルを選択してください</div>
    <div style="font-size:12px;color:var(--text2);line-height:1.8" id="up-msg">生成済みHTMLではない場合のみ、手動でXMLを選択してください。</div>
    <div style="margin-top:20px;font-size:11px;color:var(--text3)" id="up-sub"></div>
    <div style="margin-top:24px;display:block" id="up-manual">
      <div style="font-size:11px;color:var(--text2);margin-bottom:12px">または手動でXMLを選択：</div>
      <div class="dz" id="dz" onclick="document.getElementById('fi').click()">
        <div style="font-size:26px;margin-bottom:6px">📂</div>
        <div style="font-size:12px;color:var(--text2)">ここにXMLをドロップ、またはクリックして選択</div>
      </div>
      <button class="up-btn" onclick="document.getElementById('fi').click()" style="margin-top:12px">ファイルを選択</button>
    </div>
  </div>
  <input type="file" id="fi" accept=".xml" style="display:none">
</div>

<!-- APP -->
<div id="app">
  <div class="bar">
    <span class="bar-title">📋 製造課ビューア</span>
    <span class="bar-file" id="hdr-file"></span>
    <div class="vbtns" id="vbtns">
      <button class="vb" data-v="day">日</button>
      <button class="vb" data-v="week">週</button>
      <button class="vb on" data-v="month">月</button>
      <button class="vb" data-v="2m">2ヶ月</button>
      <button class="vb" data-v="3m">3ヶ月</button>
      <button class="vb" data-v="6m">6ヶ月</button>
      <button class="vb" data-v="1y">1年</button>
      <button class="vb" data-v="custom">任意</button>
    </div>
    <button class="nav-btn" id="prev-btn">◀</button>
    <span class="period-label" id="period-label"></span>
    <button class="nav-btn" id="next-btn">▶</button>
    <div id="custom-ui" style="display:none;align-items:center;gap:6px;">
      <span style="font-size:11px;color:var(--text2);white-space:nowrap">開始</span>
      <input type="date" id="custom-s" style="font-size:11px;padding:5px 7px;border:1.5px solid var(--border2);border-radius:6px;font-family:var(--sans);background:var(--white);color:var(--text);">
      <span style="font-size:11px;color:var(--text2)">〜</span>
      <input type="date" id="custom-e" style="font-size:11px;padding:5px 7px;border:1.5px solid var(--border2);border-radius:6px;font-family:var(--sans);background:var(--white);color:var(--text);">
      <button onclick="applyCustom()" style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);">適用</button>
    </div>
    <button class="today-btn" onclick="goToday()">今日</button>
    <button class="reset-btn" id="search-toggle-btn" onclick="toggleSearch()">🔍 検索・絞り込み</button>
    <button class="reset-btn" onclick="openManual()">📂 手動で開く</button>
  </div>
  <div class="spanel" id="spanel">
    <div class="spanel-row">
      <span class="sp-label">🔍 検索</span>
      <input type="text" class="sp-input" id="sp-input" placeholder="FK番号・FS番号・案件名・担当者など..." oninput="doSearch()">
      <button class="sp-btn clear" onclick="clearSearch()">クリア</button>
      <span class="sp-count" id="sp-count"></span>
    </div>
    <div id="sp-tags" style="display:flex;gap:4px;flex-wrap:wrap;min-height:0;"></div>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-box" style="background:var(--green)"></div>作業予定</div>
    <div class="leg"><div class="leg-box" style="background:var(--cyan)"></div>出荷日</div>
    <div class="leg"><div class="leg-box" style="background:var(--red)"></div>納品日</div>
    <div class="leg"><div class="leg-box" style="background:var(--blue)"></div>その他</div>
    <div class="leg"><div class="leg-line"></div>今日</div>
    <div class="leg-note">案件名・バー・マーカーをクリックで詳細</div>
    <button class="mk-toggle" id="mk-toggle-btn" onclick="toggleMkPanel()">📌 マーカー凡例を編集</button>
  </div>
  <div class="mkpanel" id="mkpanel">
    <div class="mkpanel-inner" id="mkpanel-inner"></div>
  </div>
  <div class="shell">
    <div class="lcol">
      <div class="lhead" id="lhead" onclick="cycleSort()" title="クリックでソート">
        <span>案件名</span><span class="sort-icon" id="sort-icon">⇅</span>
      </div>
      <div class="lbody" id="lbody"></div>
    </div>
    <div class="rcol">
      <div class="tl-sc" id="tlsc">
        <div class="tl-in" id="tlin">
          <div class="dh" id="dh">
            <div class="dh-top" id="dht"></div>
            <div class="dh-bot" id="dhb"></div>
          </div>
          <div id="tlrows"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="mbg" id="mbg" onclick="if(event.target===this)closeM()">
  <div class="mcard">
    <div class="mtitle" id="mtitle"></div>
    <div id="mbody"></div>
    <div style="text-align:right;margin-top:8px">
      <button class="mclose" onclick="closeM()">閉じる</button>
    </div>
  </div>
</div>

<div class="tip" id="tip"></div>

<script>

// ══════════════════════════════
// 期間定義: 「今いる期間」の開始日を決める
// ══════════════════════════════
function getPeriod(v, anchor){
  // anchor: Date（今日 or ナビゲーション後の日付）
  // returns {start: Date, end: Date, label: string}
  const a = anchor || TODAY;
  let s, e, label;
  if(v==='custom'){
    s=customStart?new Date(customStart):new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
    e=customEnd?new Date(customEnd):new Date(TODAY.getFullYear(),TODAY.getMonth()+1,0);
    label=`${fd(s)} 〜 ${fd(e)}`;
    return {start:s,end:e,label};
  }
  if(v==='day'){
    s=new Date(a); e=new Date(a);
    label=`${s.getFullYear()}年${s.getMonth()+1}月${s.getDate()}日（${['日','月','火','水','木','金','土'][s.getDay()]}）`;
  } else if(v==='week'){
    // 月曜始まり
    const dow=a.getDay()===0?7:a.getDay();
    s=addD(a,-(dow-1));
    e=addD(s,6);
    label=`${s.getFullYear()}年${s.getMonth()+1}月${s.getDate()}日 〜 ${e.getMonth()+1}月${e.getDate()}日`;
  } else if(v==='month'){
    s=new Date(a.getFullYear(),a.getMonth(),1);
    e=new Date(a.getFullYear(),a.getMonth()+1,0);
    label=`${s.getFullYear()}年${s.getMonth()+1}月`;
  } else if(v==='2m'){
    s=new Date(a.getFullYear(),a.getMonth(),1);
    e=new Date(a.getFullYear(),a.getMonth()+2,0);
    label=`${s.getFullYear()}年${s.getMonth()+1}月 〜 ${e.getFullYear()}年${e.getMonth()+1}月`;
  } else if(v==='3m'){
    s=new Date(a.getFullYear(),a.getMonth(),1);
    e=new Date(a.getFullYear(),a.getMonth()+3,0);
    label=`${s.getFullYear()}年${s.getMonth()+1}月 〜 ${e.getFullYear()}年${e.getMonth()+1}月`;
  } else if(v==='6m'){
    s=new Date(a.getFullYear(),a.getMonth(),1);
    e=new Date(a.getFullYear(),a.getMonth()+6,0);
    label=`${s.getFullYear()}年${s.getMonth()+1}月 〜 ${e.getFullYear()}年${e.getMonth()+1}月`;
  } else if(v==='1y'){
    s=new Date(a.getFullYear(),0,1);
    e=new Date(a.getFullYear(),11,31);
    label=`${s.getFullYear()}年`;
  } else if(v==='2y'){
    s=new Date(a.getFullYear(),0,1);
    e=new Date(a.getFullYear()+1,11,31);
    label=`${s.getFullYear()}年 〜 ${e.getFullYear()}年`;
  } else { // 3y
    s=new Date(a.getFullYear(),0,1);
    e=new Date(a.getFullYear()+2,11,31);
    label=`${s.getFullYear()}年 〜 ${e.getFullYear()}年`;
  }
  return {start:s, end:e, label};
}

// カスタム期間
let customStart=null, customEnd=null;
function applyCustom(){
  const sv=document.getElementById('custom-s').value;
  const ev=document.getElementById('custom-e').value;
  if(!sv||!ev){alert('開始日と終了日を入力してください');return;}
  const s=new Date(sv), e=new Date(ev);
  if(s>=e){alert('終了日は開始日より後にしてください');return;}
  customStart=s; customEnd=e;
  periodStart=new Date(s);
  renderAll();
}

function stepPeriod(v, anchor, dir){
  // dir: +1 or -1
  const a=anchor;
  if(v==='day')   return addD(a,dir);
  if(v==='week')  return addD(a,dir*7);
  if(v==='month') return new Date(a.getFullYear(),a.getMonth()+dir,1);
  if(v==='2m')    return new Date(a.getFullYear(),a.getMonth()+dir*2,1);
  if(v==='3m')    return new Date(a.getFullYear(),a.getMonth()+dir*3,1);
  if(v==='6m')    return new Date(a.getFullYear(),a.getMonth()+dir*6,1);
  if(v==='1y')    return new Date(a.getFullYear()+dir,0,1);
  if(v==='2y')    return new Date(a.getFullYear()+dir*2,0,1);
  if(v==='custom'&&customStart&&customEnd){
    const span=diffD(customStart,customEnd)+1;
    return addD(a,dir*span);
  }
  return new Date(a.getFullYear()+dir*3,0,1);
}

// AUTO LOAD & MANUAL UPLOAD
// ══════════════════════════════

function looksLikeGansukeXml_(text){
  const s = String(text || '');
  if(!s) return false;
  if(!/<\s*schedule[\s>]/i.test(s)) return false;
  if(!/<\s*item[\s>]/i.test(s)) return false;
  return true;
}

let manualSetupDone_ = false;
function showManualPrompt_(){
  document.getElementById('up-icon').textContent = '📂';
  document.getElementById('up-title').textContent = 'XMLファイルを選択してください';
  document.getElementById('up-msg').textContent = '生成済みHTMLではない場合のみ、手動でXMLを選択してください。';
  document.getElementById('up-sub').textContent = '';
  document.getElementById('up-manual').style.display = 'block';
  setupManualUpload();
}

function setupManualUpload(){
  if(manualSetupDone_) return;
  const dz=document.getElementById('dz');
  const fi=document.getElementById('fi');
  if(!dz||!fi)return;
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
  dz.addEventListener('drop',e=>{
    e.preventDefault();dz.classList.remove('drag');
    if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);
  });
  fi.addEventListener('change',()=>{if(fi.files[0])loadFile(fi.files[0]);});
  manualSetupDone_ = true;
}

function loadFile(file){
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      startApp(e.target.result, file.name);
    }catch(err){alert('XMLエラー: '+err.message);}
  };
  rd.readAsText(file,'Shift_JIS');
}

function resolveInitialPeriodStart_(){
  let minDate = null;
  const consider = (d) => {
    if(!d) return;
    if(!minDate || d < minDate) minDate = d;
  };
  ALL.forEach(row => {
    (row.charts || []).forEach(c => consider(pd(c.start)));
    (row.events || []).forEach(ev => consider(pd(ev.date)));
  });
  return minDate ? new Date(minDate) : new Date(TODAY);
}

function startApp(text, filename){
  parseG(text);
  document.getElementById('hdr-file').textContent = filename;
  document.getElementById('up').style.display='none';
  document.getElementById('app').style.display='flex';
  ROWS=[...ALL];
  periodStart=resolveInitialPeriodStart_();
  collectMarkers();
  updateCount();
  renderAll();
}

function openManual(){
  // topbarからの手動上書き読み込み
  const fi=document.getElementById('fi');
  setupManualUpload();
  fi.click();
}

function doReset(){
  ALL=[];ROWS=[];
  document.getElementById('up').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('fi').value='';
  document.getElementById('srch').value='';
}

window.addEventListener('DOMContentLoaded', function(){
  if(typeof EMBEDDED_XML === 'string' && EMBEDDED_XML.length > 0){

      return;

// ══════════════════════════════
// PARSE
// ══════════════════════════════
function parseG(text){
  text=text.replace(/[\x00-\x08\x0b\x0c\x0e-\x1f\x7f]/g,'');
  text=text.replace(/&(?!amp;|lt;|gt;|quot;|apos;)/g,'&amp;');
  const doc=new DOMParser().parseFromString(text,'text/xml');
  if(doc.querySelector('parsererror'))throw new Error('XMLパースエラー');
  ALL=[];
  doc.querySelectorAll('item').forEach(item=>{
    const txt=(item.querySelector(':scope > text')?.textContent||'').replace(/\n/g,' ').trim();
    const charts=[],events=[];
    item.querySelectorAll('chartlist > chart').forEach(c=>{
      const s=c.querySelector('startdate')?.textContent||'';
      const e=c.querySelector('enddate')?.textContent||'';
      if(!s||!e)return;
      charts.push({label:(c.querySelector('text')?.textContent||'').replace(/\n/g,' ').trim(),
        start:s,end:e,nissuu:c.querySelector('nissuu')?.textContent||'',bikou:c.querySelector('bikou')?.textContent||''});
    });
    item.querySelectorAll('eventlist > event').forEach(ev=>{
      const d=ev.querySelector('eventdate')?.textContent||'';
      if(!d)return;
      events.push({date:d,name:(ev.querySelector('eventname')?.textContent||'').replace(/\n/g,' ').trim(),
        marker:ev.querySelector('marker')?.textContent||'●'});
    });
    ALL.push({item:txt,charts,events});
  });
  if(!ALL.length) throw new Error('XMLデータが空です（itemが0件）');
}

// ══════════════════════════════
// MARKER LEGEND
// ══════════════════════════════
const MK_KEY='gansuke_markers';
let markerDefs={}; // {symbol: description}

function collectMarkers(){
  // XMLから使われてる全マーカーを収集
  const found=new Set();
  ALL.forEach(r=>r.events.forEach(ev=>{if(ev.marker)found.add(ev.marker);}));
  // 保存済みのラベルをロード
  try{
    const saved=JSON.parse(localStorage.getItem(MK_KEY)||'{}');
    found.forEach(mk=>{if(!(mk in markerDefs))markerDefs[mk]=saved[mk]||'';});
  }catch(e){}
  renderMkPanel();
}

function renderMkPanel(){
  const inner=document.getElementById('mkpanel-inner');
  if(!inner)return;
  inner.innerHTML='';
  // マーカーをソート（よく使われる順: ●▲◎▼○△▽…）
  const order=['●','▲','◎','▼','○','△','▽','◆','■','★'];
  const syms=[...Object.keys(markerDefs)].sort((a,b)=>{
    const ai=order.indexOf(a),bi=order.indexOf(b);
    if(ai>=0&&bi>=0)return ai-bi;
    if(ai>=0)return -1;if(bi>=0)return 1;
    return a.localeCompare(b);
  });
  syms.forEach(mk=>{
    const item=document.createElement('div');
    item.className='mkitem';
    item.innerHTML=`<span class="mkitem-sym">${mk}</span>
      <span class="mksep">=</span>
      <input class="mkinput" data-mk="${mk}" value="${esc(markerDefs[mk]||'')}" placeholder="意味を入力..." maxlength="30">`;
    inner.appendChild(item);
  });
  // 保存ボタン
  const saveDiv=document.createElement('div');
  saveDiv.style.cssText='display:flex;align-items:center;gap:8px;margin-top:2px;';
  saveDiv.innerHTML=`<button class="mk-save" onclick="saveMkDefs()">💾 保存</button>
    <span style="font-size:10px;color:var(--text3)" id="mk-saved-msg"></span>`;
  inner.appendChild(saveDiv);
}

function saveMkDefs(){
  document.querySelectorAll('.mkinput').forEach(inp=>{
    markerDefs[inp.dataset.mk]=inp.value.trim();
  });
  try{localStorage.setItem(MK_KEY,JSON.stringify(markerDefs));}catch(e){}
  const msg=document.getElementById('mk-saved-msg');
  if(msg){msg.textContent='✓ 保存しました';setTimeout(()=>msg.textContent='',2000);}
}

function toggleMkPanel(){
  const p=document.getElementById('mkpanel');
  p.classList.toggle('open');
  const btn=document.getElementById('mk-toggle-btn');
  btn.textContent=p.classList.contains('open')?'✕ 閉じる':'📌 マーカー凡例を編集';
}

function getMkLabel(mk){
  return markerDefs[mk]?`${mk}：${markerDefs[mk]}`:mk;
}

// ══════════════════════════════
// UTILS
// ══════════════════════════════
function pd(s){if(!s)return null;const[y,m,d]=s.split('/').map(Number);const r=new Date(y,m-1,d);r.setHours(0,0,0,0);return r;}
function fd(d){if(!d)return'';return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function diffD(a,b){return Math.round((b-a)/864e5);}
function isWE(d){return d.getDay()===0||d.getDay()===6;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function bCls(l){if(l.includes('作業'))return'g';if(l.includes('出荷'))return'c';if(l.includes('納品'))return'r';return'b';}

// SORT
// ══════════════════════════════
let sortMode=0; // 0=元順, 1=昇順, 2=降順
const SORT_ICONS=['⇅','↑↑','↓↓'];
const SORT_LABELS=['元の順番','案件名 昇順（A→Z）','案件名 降順（Z→A）'];

function cycleSort(){
  sortMode=(sortMode+1)%3;
  document.getElementById('sort-icon').textContent=SORT_ICONS[sortMode];
  document.getElementById('lhead').title=SORT_LABELS[sortMode];
  applyFilterAndSort();
}

function getSorted(arr){
  if(sortMode===0)return [...arr];
  return [...arr].sort((a,b)=>{
    const r=a.item.localeCompare(b.item,'ja');
    return sortMode===1?r:-r;
  });
}

let searchTerms=[];  // アクティブな検索キーワード群

function toggleSearch(){
  const p=document.getElementById('spanel');
  const open=p.classList.toggle('open');
  if(open)document.getElementById('sp-input').focus();
}

function doSearch(){
  const val=document.getElementById('sp-input').value.trim();

}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.activeElement===document.getElementById('sp-input')){
    const val=document.getElementById('sp-input').value.trim();
    if(val&&!searchTerms.includes(val)){
      searchTerms.push(val);
      document.getElementById('sp-input').value='';
      renderTags();
    }
    applyFilterAndSort();
  }
});

function renderTags(){
  const wrap=document.getElementById('sp-tags');
  wrap.innerHTML='';
  searchTerms.forEach((t,i)=>{
    const tag=document.createElement('div');
    tag.className='sp-tag';
    tag.innerHTML=`${esc(t)}<span class="sp-tag-x" onclick="removeTag(${i})">×</span>`;
    wrap.appendChild(tag);
  });
}

function removeTag(i){
  searchTerms.splice(i,1);
  renderTags();
  applyFilterAndSort();
}

function clearSearch(){
  searchTerms=[];
  document.getElementById('sp-input').value='';
  document.getElementById('sp-tags').innerHTML='';
  ROWS=getSorted(ALL);
  updateCount();
  renderAll();
}

function applyFilterAndSort(){
  const live=document.getElementById('sp-input').value.trim().toLowerCase();
  const allTerms=[...searchTerms.map(t=>t.toLowerCase()),(live?[live]:[])].flat();
  if(allTerms.length===0){
    ROWS=getSorted(ALL);
  } else {
    ROWS=getSorted(ALL.filter(r=>{
      const hay=r.item.toLowerCase();
      return allTerms.every(t=>hay.includes(t));
    }));
  }
  updateCount();
  renderAll();
}

function updateCount(){
  const el=document.getElementById('sp-count');
  el.textContent=ROWS.length<ALL.length?`${ROWS.length} / ${ALL.length} 件表示`:`全 ${ALL.length} 件`;

// ══════════════════════════════
// TIMELINE
// ══════════════════════════════
function renderTimeline(){
  const period=getPeriod(VIEW,periodStart);
  const focusS=period.start, focusE=period.end;
  const focusDays=diffD(focusS,addD(focusE,1));

  // update label
  document.getElementById('period-label').textContent=period.label;

  // ── pxPerDayはフォーカス期間の幅で決める（スケール固定） ──
  const availW=document.getElementById('tlsc').clientWidth||800;
  const pxPerDay=Math.max(1.5, availW/focusDays);

  // ── 描画範囲: 前後に同スケールで拡張（スクロール用） ──
  // フォーカス期間の2倍分を前後に追加
  const S=addD(focusS,-focusDays*2);
  const E=addD(focusE,focusDays*2);
  const totalDays=diffD(S,addD(E,1));

  const totalW=pxPerDay*totalDays;

  // day columns
  const days=[];
  for(let d=new Date(S);d<=E;d=addD(d,1)){
    const diff=diffD(S,d);
    days.push({d:new Date(d),x:diff*pxPerDay,w:pxPerDay,we:isWE(d),isToday:d.getTime()===TODAY.getTime()});
  }

  // ── TOP HEADER: 月 ──
  const dht=document.getElementById('dht');
  dht.innerHTML='';
  dht.style.width=totalW+'px';
  const mgroups=[];
  days.forEach(col=>{
    const key=`${col.d.getFullYear()}-${col.d.getMonth()}`;
    if(!mgroups.length||mgroups[mgroups.length-1].key!==key)
      mgroups.push({key,x:col.x,w:col.w,label:`${col.d.getFullYear()}年${col.d.getMonth()+1}月`});
    else mgroups[mgroups.length-1].w+=col.w;
  });
  mgroups.forEach(mg=>{
    const c=document.createElement('div');
    c.className='dhc mth';
    c.style.width=mg.w+'px';c.style.minWidth=mg.w+'px';
    c.textContent=mg.label;
    dht.appendChild(c);
  });

  // ── BOTTOM HEADER: 日付 or 週 ──
  const dhb=document.getElementById('dhb');
  dhb.innerHTML='';
  dhb.style.width=totalW+'px';

  if(VIEW==='week'||VIEW==='day'){
    // 日付＋曜日
    const DAYS=['日','月','火','水','木','金','土'];
    days.forEach(col=>{
      const c=document.createElement('div');
      c.className='dhc'+(col.we?' we':'')+(col.isToday?' td':'');
      c.style.width=col.w+'px';c.style.minWidth=col.w+'px';
      c.textContent=`${col.d.getDate()}(${DAYS[col.d.getDay()]})`;
      dhb.appendChild(c);
    });
  } else if(['month','2m','3m'].includes(VIEW)){
    // 日付（1日だけ月名は上段に出てる）
    days.forEach(col=>{
      const c=document.createElement('div');
      c.className='dhc'+(col.we?' we':'')+(col.isToday?' td':'');
      c.style.width=col.w+'px';c.style.minWidth=col.w+'px';
      if(pxPerDay>=10)c.textContent=col.d.getDate();
      else if(col.d.getDate()===1||col.d.getDate()===15)c.textContent=col.d.getDate();
      dhb.appendChild(c);
    });
  } else {
    // 6m/1y/2y/3y: 週番号 or 月初だけ
    days.forEach(col=>{
      const c=document.createElement('div');
      c.className='dhc'+(col.we?' we':'')+(col.isToday?' td':'');
      c.style.width=col.w+'px';c.style.minWidth=col.w+'px';
      if(col.d.getDate()===1)c.textContent=col.d.getDate()+'日';
      dhb.appendChild(c);
    });
  }

  // ── TL ROWS ──
  const tlrows=document.getElementById('tlrows');
  tlrows.innerHTML='';
  document.getElementById('tlin').style.minWidth=totalW+'px';

  // helper: date → x
  const dx=d=>{
    if(!d)return null;
    const diff=diffD(S,d);
    return diff*pxPerDay;
  };

  ROWS.forEach((row,ri)=>{
    const div=document.createElement('div');
    div.className='trow'+(ri%2===1?' alt':'');
    div.style.width=totalW+'px';

    // weekend bg + today bg
    days.forEach(col=>{
      if(col.we){
        const bg=document.createElement('div');
        bg.className='calbg we';bg.style.left=col.x+'px';bg.style.width=col.w+'px';
        div.appendChild(bg);
      }
      if(col.isToday){
        const bg=document.createElement('div');
        bg.className='calbg td-bg';bg.style.left=col.x+'px';bg.style.width=col.w+'px';
        div.appendChild(bg);
      }
    });

    // vertical lines
    days.forEach(col=>{
      const show=VIEW==='day'||VIEW==='week'
        ||(pxPerDay>=10&&true)
        ||(pxPerDay>=4&&col.d.getDate()%5===1)
        ||(pxPerDay<4&&col.d.getDate()===1);
      if(show){
        const vl=document.createElement('div');
        vl.className='vl'+(col.isToday?' td-vl':'');
        vl.style.left=col.x+'px';
        div.appendChild(vl);
      }
    });

    // today line (if not already in days range, still draw)
    if(TODAY>=S&&TODAY<=E){
      const tx=dx(TODAY);
      if(tx!==null){
        const tl=document.createElement('div');
        tl.className='vl td-vl';tl.style.left=tx+'px';
        div.appendChild(tl);
      }
    }

    // bars
    row.charts.forEach(c=>{
      const cs=pd(c.start),ce=pd(c.end);
      if(!cs||!ce)return;
      // クランプして期間内だけ表示
      const bs=cs<S?S:cs, be=ce>E?E:ce;
      if(bs>E||be<S)return;
      const bx=dx(bs);
      const bw=diffD(bs,addD(be,1))*pxPerDay;
      if(bw<=0)return;
      const bar=document.createElement('div');
      bar.className='gbar '+bCls(c.label);
      bar.style.left=Math.max(0,bx)+'px';
      bar.style.width=Math.max(3,bw)+'px';
      if(pxPerDay>=8)bar.textContent=c.label;
      bar.addEventListener('click',()=>openM(ri));
      bar.addEventListener('mouseenter',ev=>showTip(ev,`<b>${esc(c.label)}</b><br>${fd(cs)} 〜 ${fd(ce)}`));
      bar.addEventListener('mouseleave',hideTip);
      div.appendChild(bar);
    });

    // events
    row.events.forEach(ev=>{
      const d=pd(ev.date);
      if(!d||d<S||d>E)return;
      const ex=dx(d);
      if(ex===null)return;
      const el=document.createElement('div');
      el.className='gev';el.style.left=ex+'px';
      el.textContent=ev.marker||'●';
      el.addEventListener('click',()=>openM(ri));
      el.addEventListener('mouseenter',e2=>showTip(e2,`<b>${esc(getMkLabel(ev.marker))}</b><br>${esc(fd(d))}<br>${esc(ev.name)}`));
      el.addEventListener('mouseleave',hideTip);
      div.appendChild(el);
    });

    tlrows.appendChild(div);
  });

  syncScroll();

  // フォーカス期間の先頭にスクロール位置を合わせる
  requestAnimationFrame(()=>{
    const sc=document.getElementById('tlsc');
    const focusX=diffD(S,focusS)*pxPerDay;
    sc.scrollLeft=Math.max(0,focusX-12);
  });
}

let syncing=false;
function syncScroll(){
  const sc=document.getElementById('tlsc');
  const lb=document.getElementById('lbody');
  sc.onscroll=()=>{if(!syncing){syncing=true;lb.scrollTop=sc.scrollTop;syncing=false;}};
  lb.onscroll=()=>{if(!syncing){syncing=true;sc.scrollTop=lb.scrollTop;syncing=false;}};
}

// ══════════════════════════════
// MODAL
// ══════════════════════════════
function openM(idx){
  const row=ROWS[idx];
  document.getElementById('mtitle').textContent=row.item;
  let html='';
  if(row.charts.length){
    html+=`<div class="msec"><div class="msec-title">📊 チャート（${row.charts.length}件）</div>
    <table class="mtbl"><thead><tr><th>種別</th><th>開始日</th><th>終了日</th><th>日数</th><th>備考</th></tr></thead><tbody>`;
    row.charts.forEach(c=>{
      html+=`<tr><td><span class="mbadge ${bCls(c.label)}">${esc(c.label)}</span></td>
      <td>${esc(c.start)}</td><td>${esc(c.end)}</td>
      <td style="text-align:right;font-variant-numeric:tabular-nums">${c.nissuu}</td>
      <td style="color:var(--text2)">${esc(c.bikou)}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  if(row.events.length){
    const sorted=[...row.events].sort((a,b)=>pd(a.date)-pd(b.date));
    html+=`<div class="msec"><div class="msec-title">📍 イベント（${sorted.length}件）</div>
    <table class="mtbl"><thead><tr><th>日付</th><th>マーカー</th><th>内容</th></tr></thead><tbody>`;
    sorted.forEach(ev=>{
      const d=pd(ev.date);const past=d&&d<TODAY;
      const mkLabel=markerDefs[ev.marker]?`<span style="font-size:10px;color:var(--text3);margin-left:4px">${esc(markerDefs[ev.marker])}</span>`:'';
      html+=`<tr class="${past?'past-row':''}"><td style="white-space:nowrap">${esc(ev.date)}</td>
      <td style="text-align:center;font-size:15px">${ev.marker}${mkLabel}</td>
      <td>${esc(ev.name)}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  if(!html)html=`<p style="color:var(--text3);padding:16px 0">データがありません</p>`;
  document.getElementById('mbody').innerHTML=html;
  document.getElementById('mbg').classList.add('open');
}
function closeM(){document.getElementById('mbg').classList.remove('open');}
document.getElementById('mbg').addEventListener('click',e=>{if(e.target===document.getElementById('mbg'))closeM();});

// ══════════════════════════════
// TOOLTIP
// ══════════════════════════════
const tip=document.getElementById('tip');
function showTip(e,h){tip.innerHTML=h;tip.style.display='block';mvTip(e);}
function hideTip(){tip.style.display='none';}
function mvTip(e){tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px';}
document.addEventListener('mousemove',e=>{if(tip.style.display==='block')mvTip(e);});

// ══════════════════════════════
// VIEW SWITCH
// ══════════════════════════════
document.getElementById('vbtns').addEventListener('click',e=>{
  const b=e.target.closest('.vb');if(!b)return;
  document.querySelectorAll('.vb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  VIEW=b.dataset.v;
  const cui=document.getElementById('custom-ui');
  if(VIEW==='custom'){
    cui.style.display='flex';
    // 初期値: 今月
    if(!customStart){
      const s=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
      const e=new Date(TODAY.getFullYear(),TODAY.getMonth()+1,0);
      document.getElementById('custom-s').value=s.toISOString().slice(0,10);
      document.getElementById('custom-e').value=e.toISOString().slice(0,10);
    } else {
      document.getElementById('custom-s').value=customStart.toISOString().slice(0,10);
      document.getElementById('custom-e').value=customEnd.toISOString().slice(0,10);
    }
  } else {
    cui.style.display='none';
  }
  renderAll();
});

// ══════════════════════════════
// RESIZE
// ══════════════════════════════
window.addEventListener('resize',()=>renderTimeline());
</script>
