<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>がんすけビューア 生成ツール</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f3f5f9;
      color: #1a2035;
      font-family: "Noto Sans JP", system-ui, sans-serif;
    }
    .card {
      width: min(560px, 92vw);
      background: #fff;
      border: 1px solid #dfe5ef;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
    }
    .sub {
      margin: 0 0 16px;
      font-size: 13px;
      color: #4a5270;
      line-height: 1.8;
    }
    .dz {
      border: 2px dashed #c8d1e4;
      border-radius: 10px;
      background: #f7f9fe;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: 120ms ease;
    }
    .dz.drag {
      border-color: #1d4ed8;
      background: #eff4ff;
    }
    .dz .line1 {
      font-weight: 700;
      margin-bottom: 6px;
    }
    .dz .line2 {
      color: #5b6587;
      font-size: 12px;
    }
    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      border: none;
      background: #1d4ed8;
      color: #fff;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      background: #c8d1e4;
      color: #f5f7fb;
      cursor: not-allowed;
    }
    .status {
      font-size: 12px;
      color: #4a5270;
      min-height: 1.2em;
      line-height: 1.7;
    }
    .ok { color: #166534; font-weight: 700; }
    .err { color: #b91c1c; font-weight: 700; }
    .note {
      margin-top: 14px;
      color: #6b7390;
      font-size: 12px;
      line-height: 1.8;
      border-top: 1px solid #ecf0f6;
      padding-top: 12px;
    }
    code { background: #eef3ff; border-radius: 4px; padding: 1px 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>がんすけビューア 生成ツール</h1>
    <p class="sub">XMLを読み込み、埋め込み済みのビューアHTMLを生成します。</p>

    <div id="dz" class="dz">
      <div class="line1">XMLをドロップ、またはクリックして選択</div>
      <div class="line2" id="file-name">未選択</div>
    </div>
    <input id="fi" type="file" accept=".xml,text/xml" hidden>

    <div class="actions">
      <button id="btn" type="button" disabled>ビューアHTMLを生成</button>
      <div id="st" class="status"></div>
    </div>

    <div class="note">
      出力ファイル名は <code>gansuke-viewer.html</code> 固定です。<br>
      テンプレート異常時は生成せずエラー表示します。
    </div>
  </div>

  <script>
    const OUTPUT_FILENAME = "gansuke-viewer.html";
    const TEMPLATE_URL = "gansuke-viewer.html";

    let xmlText = "";
    const dz = document.getElementById("dz");
    const fi = document.getElementById("fi");
    const btn = document.getElementById("btn");
    const st = document.getElementById("st");
    const fileName = document.getElementById("file-name");

    function setStatus(message, cls) {
      st.className = "status" + (cls ? " " + cls : "");
      st.textContent = message || "";
    }

    function assertTemplateHtml(html) {
      const s = String(html || "").trim();
      const hasHtmlTag = /<html[\s>]/i.test(s);
      const hasBodyTag = /<body[\s>]/i.test(s);
      const hasScriptTag = /<script[\s>]/i.test(s);
      if (!hasHtmlTag || !hasBodyTag || !hasScriptTag) {
        throw new Error(
          "テンプレート(gansuke-viewer.html)が壊れています。正規HTMLを再アップロードしてください。"
        );
      }
      return s;
    }

    function assertGansukeXml(xml) {
      const s = String(xml || "");
      if (!/<\s*schedule[\s>]/i.test(s) || !/<\s*item[\s>]/i.test(s)) {
        throw new Error("XML構造が不正です（schedule/itemタグが見つかりません）");
      }
      const doc = new DOMParser().parseFromString(s, "text/xml");
      if (doc.querySelector("parsererror")) {
        throw new Error("XMLパースに失敗しました（文字コードまたは内容を確認してください）");
      }
      if (!doc.querySelector("item")) {
        throw new Error("XMLに案件データがありません（itemが0件）");
      }
      return s;
    }

    function readFile(file) {
      const rd = new FileReader();
      rd.onload = (e) => {
        try {
          xmlText = assertGansukeXml(String(e.target.result || ""));
          fileName.textContent = file.name + " 読み込み完了";
          btn.disabled = !xmlText;
          setStatus("");
        } catch (err) {
          xmlText = "";
          btn.disabled = true;
          fileName.textContent = file.name + " 読み込み失敗";
          setStatus(err && err.message ? err.message : "XML検証に失敗しました。", "err");
        }
      };
      rd.onerror = () => setStatus("XML読み込みに失敗しました。", "err");
      rd.readAsText(file, "Shift_JIS");
    }

    dz.addEventListener("click", () => fi.click());
    dz.addEventListener("dragover", (e) => { e.preventDefault(); dz.classList.add("drag"); });
    dz.addEventListener("dragleave", () => dz.classList.remove("drag"));
    dz.addEventListener("drop", (e) => {
      e.preventDefault();
      dz.classList.remove("drag");
      const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) readFile(f);
    });
    fi.addEventListener("change", () => {
      const f = fi.files && fi.files[0];
      if (f) readFile(f);
    });

    async function generate() {
      if (!xmlText) {
        setStatus("先にXMLを読み込んでください。", "err");
        return;
      }
      btn.disabled = true;
      setStatus("生成中です...");
      try {
        const res = await fetch(TEMPLATE_URL + "?_=" + Date.now());
        if (!res.ok) throw new Error("テンプレート取得失敗: HTTP " + res.status);
        let html = assertTemplateHtml(await res.text());

        const xmlJson = JSON.stringify(xmlText);
        const embedScript = "<script>var EMBEDDED_XML=" + xmlJson + ";<\/script>\n";
        if (/<script\b/i.test(html)) {
          html = html.replace(/<script\b/i, embedScript + "<script");
        } else if (/<\/body>/i.test(html)) {
          html = html.replace(/<\/body>/i, embedScript + "</body>");
        } else {
          html += "\n" + embedScript;
        }

        const ts = new Date();
        const stamp = ts.getFullYear() + "/" +
          String(ts.getMonth() + 1).padStart(2, "0") + "/" +
          String(ts.getDate()).padStart(2, "0") + " " +
          String(ts.getHours()).padStart(2, "0") + ":" +
          String(ts.getMinutes()).padStart(2, "0");
        html = html.replace(/製造課\s*スケジュールビューア/g, "製造課 スケジュールビューア（" + stamp + "更新）");

        const blob = new Blob([html], { type: "text/html;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = OUTPUT_FILENAME;
        a.click();
        URL.revokeObjectURL(a.href);

        setStatus("生成完了: " + OUTPUT_FILENAME + "（" + stamp + "）", "ok");
      } catch (err) {
        setStatus("エラー: " + (err && err.message ? err.message : String(err)), "err");
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener("click", generate);
  </script>
</body>
</html>
